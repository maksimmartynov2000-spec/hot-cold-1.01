<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title id="docTitle">Горячо или Холодно</title>
  <style>
    :root {
      --primary-color: #4a90e2;
      --success-color: #2ecc71;
      --danger-color: #e74c3c;
      --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg-gradient);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
      color: #333;
    }

    .game-container {
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      width: 90%;
      max-width: 400px;
      text-align: center;
    }

    h1 {
      color: #2c3e50;
      margin-bottom: 10px;
      font-size: 24px;
    }

    p.description {
      color: #7f8c8d;
      font-size: 14px;
      margin-bottom: 25px;
    }

    .stats-container {
      display: flex;
      justify-content: space-around;
      margin-bottom: 20px;
      font-size: 14px;
      font-weight: 600;
      background: #f8f9fa;
      padding: 10px;
      border-radius: 10px;
    }

    input[type="number"] {
      width: 80%;
      padding: 12px 20px;
      font-size: 18px;
      border: 2px solid #dcdde1;
      border-radius: 10px;
      margin-bottom: 15px;
      outline: none;
      transition: border-color 0.3s;
      text-align: center;
    }

    input[type="number"]:focus {
      border-color: var(--primary-color);
    }

    button {
      background: var(--primary-color);
      color: white;
      border: none;
      padding: 12px 30px;
      font-size: 16px;
      font-weight: bold;
      border-radius: 10px;
      cursor: pointer;
      transition: transform 0.1s, background 0.3s;
      width: 85%;
    }

    button:hover {
      background: #357abd;
    }

    button:active {
      transform: scale(0.98);
    }

    button.reset-btn {
      background: #7f8c8d;
      margin-top: 10px;
    }
    button.reset-btn:hover { background: #6c7a7d; }

    #output {
      margin-top: 20px;
      font-size: 18px;
      font-weight: 600;
      min-height: 27px;
    }

    .history {
      margin-top: 25px;
      text-align: left;
    }

    .history h3 {
      font-size: 14px;
      color: #7f8c8d;
      margin-bottom: 10px;
      border-bottom: 1px solid #eee;
      padding-bottom: 5px;
    }

    .history-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      max-height: 100px;
      overflow-y: auto;
    }

    .tag {
      padding: 4px 10px;
      border-radius: 15px;
      font-size: 12px;
      font-weight: bold;
      color: white;
    }
    .tag.cold { background-color: #54a0ff; }
    .tag.warm { background-color: #ff9f43; }
    .tag.hot { background-color: #ee5253; }
    .tag.correct { background-color: var(--success-color); }
  </style>
</head>
<body>

<div class="game-container">
  <h1>🔥 Горячо или Холодно ❄️</h1>
  <p class="description">Загадано число от 1 до 100. Сможешь угадать?</p>
  
  <div class="stats-container">
    <div>Попытки: <span id="attemptsCount">0</span></div>
    <div>Рекорд: <span id="highScore">-</span></div>
  </div>

  <input type="number" id="userInput" min="1" max="100" placeholder="Введите число..." autofocus />
  <button id="checkBtn" onclick="checkGuess()">Проверить</button>
  <button id="resetBtn" class="reset-btn" onclick="resetGame()" style="display:none;">Играть снова</button>
  
  <div id="output"></div>

  <div class="history">
    <h3>История попыток:</h3>
    <div id="historyTags" class="history-tags"></div>
  </div>
</div>

<script>
  let secretNumber;
  let attempts = 0;
  let gameActive = true;

  // Инициализация игры
  function initGame() {
    secretNumber = Math.floor(Math.random() * 100) + 1;
    attempts = 0;
    gameActive = true;
    document.getElementById("attemptsCount").innerText = attempts;
    document.getElementById("output").innerText = "";
    document.getElementById("output").style.color = "#333";
    document.getElementById("userInput").value = "";
    document.getElementById("userInput").disabled = false;
    document.getElementById("checkBtn").style.display = "inline-block";
    document.getElementById("resetBtn").style.display = "none";
    document.getElementById("historyTags").innerHTML = "";
    
    // Обновление рекорда из памяти
    const savedScore = localStorage.getItem("hotColdHighScore");
    document.getElementById("highScore").innerText = savedScore ? savedScore : "-";
    document.getElementById("userInput").focus();
  }

  function checkGuess() {
    if (!gameActive) return;

    const inputField = document.getElementById("userInput");
    const guess = parseInt(inputField.value);
    const output = document.getElementById("output");
    const historyTags = document.getElementById("historyTags");

    // Валидация ввода
    if (isNaN(guess) || guess < 1 || guess > 100) {
      output.innerText = "⚠️ Введите корректное число от 1 до 100!";
      output.style.color = "#e67e22";
      return;
    }

    attempts++;
    document.getElementById("attemptsCount").innerText = attempts;

    let difference = Math.abs(secretNumber - guess);
    let message = "";
    let statusClass = "";

    if (guess === secretNumber) {
      message = `🎉 Ура! Вы угадали число ${secretNumber} за ${attempts} попыток!`;
      output.style.color = "var(--success-color)";
      statusClass = "correct";
      endGame();
    } else {
      if (difference <= 5) {
        message = "🥵 Очень горячо!";
        output.style.color = "var(--danger-color)";
        statusClass = "hot";
      } else if (difference <= 15) {
        message = "🔥 Горячо!";
        output.style.color = "#e67e22";
        statusClass = "warm";
      } else if (difference <= 30) {
        message = "🌤️ Тепло";
        output.style.color = "#f1c40f";
        statusClass = "warm";
      } else {
        message = "❄️ Холодно...";
        output.style.color = "#3498db";
        statusClass = "cold";
      }
      
      // Подсказка направления
      message += guess < secretNumber ? " (Загаданное число больше)" : " (Загаданное число меньше)";
    }

    output.innerText = message;

    // Добавление тега в историю
    const tag = document.createElement("span");
    tag.className = `tag ${statusClass}`;
    tag.innerText = guess;
    historyTags.appendChild(tag);
    historyTags.scrollTop = historyTags.scrollHeight;

    inputField.value = "";
    inputField.focus();
  }

  function endGame() {
    gameActive = false;
    document.getElementById("userInput").disabled = true;
    document.getElementById("checkBtn").style.display = "none";
    document.getElementById("resetBtn").style.display = "inline-block";

    // Проверка и сохранение рекорда
    const currentHighScore = localStorage.getItem("hotColdHighScore");
    if (!currentHighScore || attempts < parseInt(currentHighScore)) {
      localStorage.setItem("hotColdHighScore", attempts);
      document.getElementById("highScore").innerText = attempts + " (Новый!)";
    }
  }

  function resetGame() {
    initGame();
  }

  // Поддержка нажатия Enter
  document.getElementById("userInput").addEventListener("keypress", function(event) {
    if (event.key === "Enter") {
      checkGuess();
    }
  });

  // Запуск игры при загрузке страницы
  window.onload = initGame;
</script>

</body>
</html>
