<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <title id="docTitle">Hot or Cold</title>
  <meta name="apple-mobile-web-app-title" content="Hot or Cold" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #1e3a5f 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      padding: 12px;
    }

    .card {
      width: 100%;
      max-width: 520px;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      padding: 24px 20px;
      color: #fff;
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
      position: relative;
    }

    .lang-switcher {
      position: absolute;
      top: 14px;
      right: 14px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: rgba(255, 255, 255, 0.8);
      border-radius: 8px;
      padding: 4px 6px;
      font-size: 12px;
      cursor: pointer;
      outline: none;
      font-weight: 500;
    }
    .lang-switcher:focus { border-color: rgba(255,255,255,0.4); }

    .header { text-align: center; margin-bottom: 20px; margin-top: 10px; }
    .header .emoji { font-size: clamp(30px, 8vw, 40px); margin-bottom: 6px; }
    .header h1 { font-size: clamp(20px, 5vw, 24px); font-weight: 700; letter-spacing: -0.5px; }

    .row { display: flex; gap: 8px; width: 100%; }

    input[type=number] {
      flex: 1;
      min-width: 0;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      font-size: 16px;
      outline: none;
      -moz-appearance: textfield;
      caret-color: #fff;
    }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }

    .btn {
      padding: 12px 16px;
      border-radius: 12px;
      border: none;
      background: #6366f1;
      color: #fff;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
    }
    .btn:hover { background: #4f46e5; }

    .btn-yellow {
      padding: 12px 16px;
      border-radius: 12px;
      border: none;
      background: #fbbf24;
      color: #1c1917;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
    }
    .btn-yellow:hover { background: #f59e0b; }

    .btn-reset {
      background: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.7);
      font-size: 12px;
      padding: 6px 12px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-weight: 500;
    }

    .info-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      padding: 10px 14px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 12px;
      flex-wrap: wrap;
    }
    .info-bar .confirmed { font-size: 13px; color: rgba(255, 255, 255, 0.6); }
    .info-bar .attempts { font-size: 13px; font-weight: 600; color: #a5f3fc; }
    .info-bar .attempts.low { color: #f87171; }

    .feedback-panel {
      border-radius: 16px;
      padding: 14px 16px;
      margin-bottom: 16px;
      text-align: center;
      animation: pop 0.3s ease;
    }
    .feedback-panel .fb-label { font-size: clamp(20px, 6vw, 26px); font-weight: 600; }

    @keyframes pop {
      0% { transform: scale(0.95); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .final-box {
      background: rgba(251, 191, 36, 0.1);
      border: 1px solid #fbbf24;
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 16px;
    }
    .final-box p {
      text-align: center;
      font-size: 14px;
      color: #fde68a;
      font-weight: 600;
      margin-bottom: 10px;
    }

    .result-box {
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 16px;
      text-align: center;
      font-size: 15px;
      font-weight: 600;
      line-height: 1.4;
    }
    .result-win { background: rgba(22, 163, 74, 0.2); border: 1px solid #16a34a; color: #86efac; }
    .result-lose { background: rgba(239, 68, 68, 0.2); border: 1px solid #ef4444; color: #fca5a5; }

    .guess-section { margin-bottom: 16px; }
    .guess-section p { margin-bottom: 8px; font-size: 14px; color: rgba(255, 255, 255, 0.65); font-weight: 500; }

    .history-section { margin-bottom: 16px; }
    .history-title {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.4);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }
    .history-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 160px;
      overflow-y: auto;
      padding-right: 4px;
    }
    .history-list::-webkit-scrollbar { width: 4px; }
    .history-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }

    .history-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.06);
      gap: 10px;
    }
    .history-item .h-num { color: rgba(255, 255, 255, 0.4); font-size: 12px; }
    .history-item .h-guess { font-weight: 700; font-size: 16px; flex-shrink: 0; }
    .history-item .h-label { font-size: 13px; font-weight: 600; text-align: right; word-break: break-word; }

    .legend { margin-top: 20px; border-top: 1px solid rgba(255, 255, 255, 0.08); padding-top: 14px; }
    .legend-title { font-size: 12px; color: rgba(255, 255, 255, 0.35); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 8px; }
    .legend-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 6px 12px;
      margin-bottom: 16px;
    }
    .legend-item { display: flex; justify-content: space-between; align-items: center; font-size: 12px; }
    .legend-item .l-label { font-weight: 600; }
    .legend-item .l-range { color: rgba(255, 255, 255, 0.4); font-variant-numeric: tabular-nums; }

    .instruction-box {
      background: rgba(255, 255, 255, 0.03);
      border-radius: 12px;
      padding: 12px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    .instruction-box summary {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
      font-weight: 600;
      cursor: pointer;
      user-select: none;
      outline: none;
    }
    .instruction-box p {
      margin-top: 8px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.45);
      line-height: 1.4;
      white-space: pre-line;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>
<div class="card">
  <select class="lang-switcher" id="langSwitcher">
    <option value="en">🇺🇸 EN</option>
    <option value="ru">🇷🇺 RU</option>
    <option value="fr">🇫🇷 FR</option>
    <option value="de">🇩🇪 DE</option>
  </select>

  <div class="header">
    <div class="emoji">🌡️</div>
    <h1 id="tTitle">Hot or Cold</h1>
  </div>

  <div class="info-bar">
    <span class="confirmed" id="tConfirmed">Number generated ✓</span>
    <span class="attempts" id="attemptsLabel"></span>
    <button class="btn-reset" id="newGameBtn">New Game</button>
  </div>

  <div class="feedback-panel hidden" id="feedbackPanel">
    <div class="fb-label" id="feedbackLabel"></div>
  </div>

  <div class="final-box hidden" id="finalBox">
    <p id="tFinalWarning">20 attempts used — last chance!</p>
    <div class="row">
      <input type="number" id="finalInput" min="1" max="1000" placeholder="" pattern="[0-9]*" inputmode="numeric" />
      <button class="btn-yellow" id="finalSubmitBtn">Submit</button>
    </div>
  </div>

  <div class="result-box hidden" id="resultBox"></div>

  <div class="guess-section" id="guessSection">
    <p id="tEnterGuess">Enter a number</p>
    <div class="row">
      <input type="number" id="guessInput" min="1" max="1000" placeholder="" pattern="[0-9]*" inputmode="numeric" />
      <button class="btn" id="submitGuessBtn">Check</button>
    </div>
  </div>

  <div class="history-section hidden" id="historySection">
    <div class="history-title" id="tHistoryTitle">Guess History</div>
    <div class="history-list" id="historyList"></div>
  </div>

  <div class="legend">
    <div class="legend-title" id="tLegendTitle">Thermal Scale</div>
    <div class="legend-grid" id="legendGrid"></div>

    <details class="instruction-box">
      <summary id="tInsTitle">Rules 📋</summary>
      <p id="tInsBody">Loading...</p>
    </details>
  </div>
</div>

<script>
  // ============================================================
  //  Всё состояние и логика игры изолированы внутри IIFE,
  //  чтобы не засорять глобальную область видимости (window).
  // ============================================================
  (function () {
    'use strict';

    // ------------------------------------------------------------
    // 1. Константы и данные (i18n, шкала подсказок)
    // ------------------------------------------------------------
    const i18n = {
      en: {
        title: "Hot or Cold", docTitle: "Hot or Cold",
        confirmed: "Number generated ✓", attemptsPrefix: "Attempts: ", newGame: "New Game",
        enterGuess: "Enter a number", placeholder: "Number 1–1000...", submitGuess: "Check",
        finalWarning: "20 attempts used — last chance!", finalSubmit: "Submit",
        resultWin: "🎉 Victory! Number is guessed!", resultLose: "❌ Wrong. The secret number was: ",
        historyTitle: "Guess History", legendTitle: "Distance Scale",
        insTitle: "How to play? 📋",
        insBody: "Guess the secret number (from 1 to 1000) in 20 attempts.\n\nThe thermometer tracks the distance (difference) between your guess and the secret number.\n\nExample: the secret number is 350, you enter 900 — the distance is 550 steps. The thermometer will show: 🧊 Very cold.\n\nThe smaller this distance, the higher the thermometer temperature.\n\nGood luck!",
        labels: ["🧊 Very cold", "❄️ Cold", "🌬️ Chilly", "🌤️ Warm", "☀️ Hot", "🔥 Very hot", "💥 Burning", "🌋 Lava", "🎯 Bullseye!"],
        finalInput: "Final answer..."
      },
      ru: {
        title: "Горячо — Холодно", docTitle: "Горячо — Холодно",
        confirmed: "Число загадано ✓", attemptsPrefix: "Попыток: ", newGame: "Новая игра",
        enterGuess: "Введите число", placeholder: "Число от 1 до 1000...", submitGuess: "Проверить",
        finalWarning: "20 попыток использовано — последний шанс!", finalSubmit: "Ответ",
        resultWin: "🎉 Победа! Число угадано!", resultLose: "❌ Неверно. Загаданное число было: ",
        historyTitle: "История попыток", legendTitle: "Шкала расстояний",
        insTitle: "Как играть? 📋",
        insBody: "Отгадайте секретное число (от 1 до 1000) за 20 попыток.\n\nГрадусник измеряет расстояние (разницу) между вашим вариантом и секретным числом.\n\nНапример: секретное число 350, вы вводите 900 — расстояние 550 шагов. Градусник покажет: 🧊 Очень холодно.\n\nЧем меньше это расстояние, тем выше температура градусника.\n\nУдачи!",
        labels: ["🧊 Очень холодно", "❄️ Холодно", "🌬️ Прохладно", "🌤️ Тепло", "☀️ Жарко", "🔥 Горячо", "💥 Очень горячо", "🌋 Лава", "🎯 В точку!"],
        finalInput: "Финальный ответ..."
      },
      fr: {
        title: "Chaud ou Froid", docTitle: "Chaud ou Froid",
        confirmed: "Nombre généré ✓", attemptsPrefix: "Essais: ", newGame: "Nouvelle partie",
        enterGuess: "Entrez un nombre", placeholder: "Nombre 1–1000...", submitGuess: "Vérifier",
        finalWarning: "20 tentatives utilisées — dernière chance !", finalSubmit: "Valider",
        resultWin: "🎉 Victoire ! Le nombre a été deviné !", resultLose: "❌ Incorrect. Le nombre secret était : ",
        historyTitle: "Historique des tentatives", legendTitle: "Échelle de distance",
        insTitle: "Comment jouer ? 📋",
        insBody: "Devinez le nombre secret (de 1 à 1000) en 20 tentatives.\n\nLe thermomètre mesure la distance (la différence) entre votre proposition et le nombre secret.\n\nExemple : le nombre secret est 350, vous entrez 900 — la distance est de 550 pas. Le thermomètre affichera : 🧊 Très froid.\n\nPlus cette distance est petite, plus la température du thermomètre est élevée.\n\nBonne chance !",
        labels: ["🧊 Très froid", "❄️ Froid", "🌬️ Frais", "🌤️ Tiède", "☀️ Chaud", "🔥 Très chaud", "💥 Brûlant", "🌋 Lave", "🎯 Dans le mille !"],
        finalInput: "Réponse finale..."
      },
      de: {
        title: "Heiß oder Kalt", docTitle: "Heiß oder Kalt",
        confirmed: "Zahl generiert ✓", attemptsPrefix: "Versuche: ", newGame: "Neues Spiel",
        enterGuess: "Gib eine Zahl ein", placeholder: "Zahl 1–1000...", submitGuess: "Prüfen",
        finalWarning: "20 Versuche aufgebraucht — letzte Chance!", finalSubmit: "Bestätigen",
        resultWin: "🎉 Gewonnen! Die Zahl wurde erraten!", resultLose: "❌ Falsch. Die Geheimzahl war: ",
        historyTitle: "Rateverlauf", legendTitle: "Entfernungsskala",
        insTitle: "Spielanleitung 📋",
        insBody: "Errate die Geheimzahl (von 1 bis 1000) in 20 Versuchen.\n\nDas Thermometer misst den Abstand (die Differenz) zwischen deinem Tipp und der Geheimzahl.\n\nBeispiel: Die Geheimzahl ist 350, du gibst 900 ein — der Abstand beträgt 550 Schritte. Das Thermometer zeigt: 🧊 Sehr kalt.\n\nJe kleiner dieser Abstand ist, desto höher ist die Temperatur.\n\nViel Glück!",
        labels: ["🧊 Sehr kalt", "❄️ Kalt", "🌬️ Kühl", "🌤️ Warm", "☀️ Heiß", "🔥 Sehr heiß", "💥 Glühend", "🌋 Lava", "🎯 Volltreffer!"],
        finalInput: "Letzte Antwort..."
      }
    };

    const FEEDBACK_META = [
      { min: 501, max: 1000, color: "#93C5FD", bg: "rgba(147, 197, 253, 0.15)", labelIndex: 0, rangeSign: "501–1000" },
      { min: 201, max: 500,  color: "#38BDF8", bg: "rgba(56, 189, 248, 0.15)",  labelIndex: 1, rangeSign: "201–500" },
      { min: 101, max: 200,  color: "#2DD4BF", bg: "rgba(45, 212, 191, 0.15)",  labelIndex: 2, rangeSign: "101–200" },
      { min: 51,  max: 100,  color: "#FBBF24", bg: "rgba(251, 191, 36, 0.15)",  labelIndex: 3, rangeSign: "51–100" },
      { min: 21,  max: 50,   color: "#FB923C", bg: "rgba(251, 146, 60, 0.15)",  labelIndex: 4, rangeSign: "21–50" },
      { min: 11,  max: 20,   color: "#F87171", bg: "rgba(248, 113, 113, 0.15)", labelIndex: 5, rangeSign: "11–20" },
      { min: 4,   max: 10,   color: "#FF5733", bg: "rgba(255, 87, 51, 0.18)",   labelIndex: 6, rangeSign: "4–10" },
      { min: 1,   max: 3,    color: "#FF4500", bg: "rgba(255, 69, 0, 0.2)",     labelIndex: 7, rangeSign: "1–3" },
      { min: 0,   max: 0,    color: "#4ADE80", bg: "rgba(74, 222, 128, 0.15)",  labelIndex: 8, rangeSign: "0" }
    ];

    const MAX_GUESSES = 20;
    const DEFAULT_LANG = 'en';

    // ------------------------------------------------------------
    // 2. Кэширование DOM-элементов (один раз при загрузке)
    // ------------------------------------------------------------
    const dom = {
      docTitle: document.getElementById('docTitle'),
      langSwitcher: document.getElementById('langSwitcher'),

      tTitle: document.getElementById('tTitle'),
      tConfirmed: document.getElementById('tConfirmed'),
      tNewGame: document.getElementById('newGameBtn'),
      tFinalWarning: document.getElementById('tFinalWarning'),
      tFinalSubmit: document.getElementById('finalSubmitBtn'),
      tEnterGuess: document.getElementById('tEnterGuess'),
      tSubmitGuess: document.getElementById('submitGuessBtn'),
      tHistoryTitle: document.getElementById('tHistoryTitle'),
      tLegendTitle: document.getElementById('tLegendTitle'),
      tInsTitle: document.getElementById('tInsTitle'),
      tInsBody: document.getElementById('tInsBody'),

      attemptsLabel: document.getElementById('attemptsLabel'),
      newGameBtn: document.getElementById('newGameBtn'),

      feedbackPanel: document.getElementById('feedbackPanel'),
      feedbackLabel: document.getElementById('feedbackLabel'),

      finalBox: document.getElementById('finalBox'),
      finalInput: document.getElementById('finalInput'),
      finalSubmitBtn: document.getElementById('finalSubmitBtn'),

      resultBox: document.getElementById('resultBox'),

      guessSection: document.getElementById('guessSection'),
      guessInput: document.getElementById('guessInput'),
      submitGuessBtn: document.getElementById('submitGuessBtn'),

      historySection: document.getElementById('historySection'),
      historyList: document.getElementById('historyList'),

      legendGrid: document.getElementById('legendGrid')
    };

    // ------------------------------------------------------------
    // 3. Состояние игры (единственное место объявления `let`)
    // ------------------------------------------------------------
    let currentLang = DEFAULT_LANG;
    let secret = generateSecret();
    let history = [];
    let gameOver = false;
    let gameOverType = null;

    // ------------------------------------------------------------
    // 4. Вспомогательные функции
    // ------------------------------------------------------------
    function generateSecret() {
      return Math.floor(Math.random() * 1000) + 1;
    }

    function getFeedback(distance) {
      return FEEDBACK_META.find(f => distance >= f.min && distance <= f.max) || FEEDBACK_META[0];
    }

    function getFbText(meta) {
      return i18n[currentLang].labels[meta.labelIndex];
    }

    // Очищает контейнер безопасным способом (без innerHTML)
    function clearElement(el) {
      while (el.firstChild) {
        el.removeChild(el.firstChild);
      }
    }

    // ------------------------------------------------------------
    // 5. Рендеринг / обновление интерфейса
    // ------------------------------------------------------------
    function applyTranslations() {
      const t = i18n[currentLang];

      dom.docTitle.textContent = t.docTitle;
      dom.tTitle.textContent = t.title;
      dom.tConfirmed.textContent = t.confirmed;
      dom.tNewGame.textContent = t.newGame;
      dom.tFinalWarning.textContent = t.finalWarning;
      dom.tFinalSubmit.textContent = t.finalSubmit;
      dom.tEnterGuess.textContent = t.enterGuess;
      dom.tSubmitGuess.textContent = t.submitGuess;
      dom.tHistoryTitle.textContent = t.historyTitle;
      dom.tLegendTitle.textContent = t.legendTitle;
      dom.tInsTitle.textContent = t.insTitle;
      dom.tInsBody.textContent = t.insBody;

      dom.guessInput.placeholder = t.placeholder;
      dom.finalInput.placeholder = t.finalInput;

      buildLegend();
      updateAttemptsLabel();
      renderHistory();

      if (gameOver) {
        showResult(gameOverType);
      }
    }

    function buildLegend() {
      clearElement(dom.legendGrid);
      const labels = i18n[currentLang].labels;
      const fragment = document.createDocumentFragment();

      FEEDBACK_META.slice(0, 8).forEach(meta => {
        const item = document.createElement('div');
        item.className = 'legend-item';

        const labelSpan = document.createElement('span');
        labelSpan.className = 'l-label';
        labelSpan.style.color = meta.color;
        labelSpan.textContent = labels[meta.labelIndex];

        const rangeSpan = document.createElement('span');
        rangeSpan.className = 'l-range';
        rangeSpan.textContent = meta.rangeSign;

        item.appendChild(labelSpan);
        item.appendChild(rangeSpan);
        fragment.appendChild(item);
      });

      dom.legendGrid.appendChild(fragment);
    }

    function showFeedback(meta) {
      dom.feedbackPanel.style.background = meta.bg;
      dom.feedbackPanel.style.border = `1px solid ${meta.color}`;
      dom.feedbackPanel.classList.remove('hidden');

      dom.feedbackLabel.textContent = getFbText(meta);
      dom.feedbackLabel.style.color = meta.color;
    }

    function showResult(type) {
      if (type === 'lose_waiting') return;

      const t = i18n[currentLang];
      dom.resultBox.className = 'result-box ' + (type === 'win' ? 'result-win' : 'result-lose');
      dom.resultBox.textContent = type === 'win' ? t.resultWin : `${t.resultLose}${secret}`;
      dom.resultBox.classList.remove('hidden');
      dom.guessSection.classList.add('hidden');
      dom.feedbackPanel.classList.add('hidden');
    }

    function renderHistory() {
      if (history.length === 0) {
        dom.historySection.classList.add('hidden');
        return;
      }
      dom.historySection.classList.remove('hidden');
      clearElement(dom.historyList);

      const fragment = document.createDocumentFragment();

      [...history].reverse().forEach((h, i) => {
        const realIndex = history.length - i;

        const item = document.createElement('div');
        item.className = 'history-item';
        item.style.borderLeft = `3px solid ${h.meta.color}`;

        const numSpan = document.createElement('span');
        numSpan.className = 'h-num';
        numSpan.textContent = `#${realIndex}`;

        const guessSpan = document.createElement('span');
        guessSpan.className = 'h-guess';
        guessSpan.textContent = String(h.guess);

        const labelSpan = document.createElement('span');
        labelSpan.className = 'h-label';
        labelSpan.style.color = h.meta.color;
        labelSpan.textContent = getFbText(h.meta);

        item.appendChild(numSpan);
        item.appendChild(guessSpan);
        item.appendChild(labelSpan);
        fragment.appendChild(item);
      });

      dom.historyList.appendChild(fragment);
    }

    function updateAttemptsLabel() {
      const left = MAX_GUESSES - history.length;
      const t = i18n[currentLang];
      dom.attemptsLabel.textContent = `${t.attemptsPrefix}${left} / ${MAX_GUESSES}`;
      dom.attemptsLabel.className = 'attempts' + (left <= 3 ? ' low' : '');
    }

    // ------------------------------------------------------------
    // 6. Игровая логика (обработчики событий)
    // ------------------------------------------------------------
    function handleGuess() {
      if (gameOver) return;

      const guess = parseInt(dom.guessInput.value, 10);
      if (isNaN(guess) || guess < 1 || guess > 1000) return;

      const distance = Math.abs(guess - secret);
      const meta = getFeedback(distance);
      history.push({ guess, distance, meta });
      dom.guessInput.value = '';

      showFeedback(meta);
      renderHistory();
      updateAttemptsLabel();

      if (distance === 0) {
        gameOver = true;
        gameOverType = 'win';
        showResult('win');
      } else if (history.length >= MAX_GUESSES) {
        gameOver = true;
        gameOverType = 'lose_waiting';
        dom.guessSection.classList.add('hidden');
        dom.finalBox.classList.remove('hidden');
      }
    }

    function submitFinal() {
      const g = parseInt(dom.finalInput.value, 10);
      if (isNaN(g)) return;

      dom.finalBox.classList.add('hidden');
      gameOverType = (g === secret ? 'win' : 'lose');
      showResult(gameOverType);
    }

    function resetGame() {
      secret = generateSecret();
      history = [];
      gameOver = false;
      gameOverType = null;

      dom.feedbackPanel.classList.add('hidden');
      dom.finalBox.classList.add('hidden');
      dom.resultBox.classList.add('hidden');
      dom.historySection.classList.add('hidden');
      dom.guessSection.classList.remove('hidden');
      dom.guessInput.value = '';
      dom.finalInput.value = '';
      updateAttemptsLabel();
    }

    function changeLanguage() {
      currentLang = dom.langSwitcher.value;
      applyTranslations();
    }

    // ------------------------------------------------------------
    // 7. Инициализация: подписка на события и первичный рендер
    // ------------------------------------------------------------
    dom.langSwitcher.addEventListener('change', changeLanguage);
    dom.newGameBtn.addEventListener('click', resetGame);
    dom.submitGuessBtn.addEventListener('click', handleGuess);
    dom.finalSubmitBtn.addEventListener('click', submitFinal);

    dom.guessInput.addEventListener('keydown', e => { if (e.key === 'Enter') handleGuess(); });
    dom.finalInput.addEventListener('keydown', e => { if (e.key === 'Enter') submitFinal(); });

    dom.langSwitcher.value = currentLang;
    applyTranslations();
  })();
</script>
</body>
</html>
