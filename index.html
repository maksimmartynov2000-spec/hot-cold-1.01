<body class="bg-ink text-paper font-body min-h-screen pb-16">

      class="btn-focus px-8 py-3 rounded-md font-display text-lg font-600 tracking-wide bg-brass text-ink hover:bg-[#e3bb52] transition-colors shadow-lg shadow-black/30 disabled:opacity-40 disabled:cursor-not-allowed">
      Бросить кубик и начать ход

  <section class="grid grid-cols-1 lg:grid-cols-2 gap-5">
    <div>

        <span class="w-2 h-2 rounded-full bg-brass"></span> Ваш город
      </h2>

      <h2 class="font-display text-xl text-paper mb-2 flex items-center gap-2">
        <span class="w-2 h-2 rounded-full bg-rose"></span> Город соперника (ИИ)

</div>

<div id="win-modal" class="hidden fixed inset-0 bg-black/70 backdrop-blur-sm z-50 flex items-center justify-center px-4">
  <div class="bg-panel border border-brass/60 rounded-lg p-8 max-w-md w-full text-center animate-pop">
    <h2 id="win-title" class="font-display text-3xl text-brass mb-2"></h2>
    <p id="win-sub" class="text-muted mb-6 font-body text-sm"></p>
    <button data-action="restart" class="btn-focus px-6 py-2.5 rounded-md bg-brass text-ink font-display font-600 hover:bg-[#e3bb52] transition-colors">
      Основать новое поселение
    </button>
  </div>
</div>

<script>
/* =========================================================
   GAME DATA DEFINITIONS (UPDATED BALANCE)
========================================================= */
const BUILDING_DEFS = {
  Farm:     { label: 'Ферма',    cost: 3,  maint: 1, resource: 'food',     base: 1, boosted: 4, icon: '🌾', color: 'moss',  maxDurability: 4 },
  House:    { label: 'Дом',      cost: 3,  maint: 1, resource: 'housing',  base: 1, boosted: 4, icon: '🏠', color: 'teal',  maxDurability: 4 },
  Hospital: { label: 'Больница', cost: 4,  maint: 1, resource: 'medicine', base: 1, boosted: 4, icon: '⚕️', color: 'rose',  maxDurability: 4 },
  Bank:     { label: 'Банк',     cost: 12, maint: 2, resource: 'gold',     base: 1, boosted: 5, icon: '🪙', color: 'brass', maxDurability: 5 },
};
const CITIZEN_COST = 4;
const CITIZEN_MAX_DURABILITY = 5;

const RESOURCE_LABEL_RU = { gold: 'золото', food: 'еды', housing: 'жилья', medicine: 'медицины' };
const COLOR_CLASS = { moss: 'text-moss', teal: 'text-teal', rose: 'text-rose', brass: 'text-brass' };
const DICE_FACES = ['', '⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];

let uidCounter = 1;
function uid(prefix) { return prefix + (uidCounter++); }

/* =========================================================
   STATE FACTORY
========================================================= */
function newPlayerState(name) {
  const farmId = uid('b');
  const houseId = uid('b');
  const workerId = uid('c');
  return {
    name,
    gold: 7, // Немного увеличили стартовый капитал
    warehouse: { food: 2, housing: 2, medicine: 1 }, // Стартовые запасы для защиты от кризиса первого хода
    buildings: [
      { id: farmId,  type: 'Farm',  durability: BUILDING_DEFS.Farm.maxDurability, workerId: workerId },
      { id: houseId, type: 'House', durability: BUILDING_DEFS.House.maxDurability, workerId: null },
    ],
    citizens: [
      { id: workerId, durability: CITIZEN_MAX_DURABILITY, assignedTo: farmId },
    ],
  };
}

function newGame() {
  return {
    round: 1,
    activeTurn: 'player',
    phase: 'ready',        // 'ready' | 'market' | 'ai-turn'
    purchasedThisTurn: false,
    gameOver: false,
    winner: null,
    lastDiceRoll: null,
    lastEventText: '',
    log: [],
    player: newPlayerState('Вы'),
    ai: newPlayerState('Соперник (ИИ)'),
  };
}

let game = newGame();

function logMsg(msg, type) {
  game.log.unshift({ msg, type, round: game.round });
  if (game.log.length > 80) game.log.pop();
}

/* =========================================================
   CORE ENGINE
========================================================= */
function agingPhase(actor) {
  actor.buildings.forEach(b => { b.durability -= 1; });
  const expired = actor.buildings.filter(b => b.durability <= 0);
  expired.forEach(b => {
    if (b.workerId) {
      const c = actor.citizens.find(c => c.id === b.workerId);
      if (c) c.assignedTo = null;
    }
    logMsg(`${actor.name}: здание «${BUILDING_DEFS[b.type].label}» разрушилось — истёк срок службы.`, 'decay');
  });
  actor.buildings = actor.buildings.filter(b => b.durability > 0);

  actor.citizens.forEach(c => { c.durability -= 1; });
  const passed = actor.citizens.filter(c => c.durability <= 0);
  passed.forEach(c => {
    if (c.assignedTo) {
      const b = actor.buildings.find(b => b.id === c.assignedTo);
      if (b) b.workerId = null;
    }
    logMsg(`${actor.name}: житель скончался от старости.`, 'death');
  });
  actor.citizens = actor.citizens.filter(c => c.durability > 0);
}

function rollDicePhase(actor) {
  const roll = 1 + Math.floor(Math.random() * 6);
  const modifiers = { food: 1, housing: 1, medicine: 1, econCrisis: false };
  let eventText = '';
  switch (roll) {
    case 1:
      modifiers.food = 2;
      eventText = 'Голод — в этот ход жители потребляют вдвое больше еды.';
      break;
    case 2:
      modifiers.housing = 2;
      eventText = 'Жилищный кризис — в этот ход жители потребляют вдвое больше жилья.';
      break;
    case 3:
      modifiers.medicine = 2;
      eventText = 'Эпидемия — в этот ход жители потребляют вдвое больше медицины.';
      break;
    case 4:
      modifiers.econCrisis = true;
      eventText = 'Экономический кризис — содержание каждого здания обходится на 1🪙 дороже.';
      break;
    case 5: {
      if (actor.citizens.length > 0) {
        const idx = Math.floor(Math.random() * actor.citizens.length);
        const victim = actor.citizens[idx];
        if (victim.assignedTo) {
          const b = actor.buildings.find(b => b.id === victim.assignedTo);
          if (b) b.workerId = null;
        }
        actor.citizens.splice(idx, 1);
        eventText = 'Один из жителей неожиданно уехал из города.';
      } else {
        eventText = 'Судьба искала жителя, но город пуст.';
      }
      break;
    }
    case 6: {
      actor.citizens.push({ id: uid('c'), durability: CITIZEN_MAX_DURABILITY, assignedTo: null });
      eventText = 'Иммиграция — прибыл новый рабочий, пока без дела.';
      break;
    }
  }
  game.lastDiceRoll = roll;
  game.lastEventText = eventText;
  logMsg(`${actor.name} выбрасывает ${roll}: ${eventText}`, 'dice');
  return modifiers;
}

function productionPhase(actor, modifiers) {
  let grossGold = 0, grossFood = 0, grossHousing = 0, grossMedicine = 0, upkeep = 0;
  actor.buildings.forEach(b => {
    const def = BUILDING_DEFS[b.type];
    const amount = b.workerId ? def.boosted : def.base;
    if (def.resource === 'gold') grossGold += amount;
    else if (def.resource === 'food') grossFood += amount;
    else if (def.resource === 'housing') grossHousing += amount;
    else if (def.resource === 'medicine') grossMedicine += amount;
    upkeep += def.maint + (modifiers.econCrisis ? 1 : 0);
  });

  actor.warehouse.food += grossFood;
  actor.warehouse.housing += grossHousing;
  actor.warehouse.medicine += grossMedicine;
  actor.gold += grossGold;
  actor.gold -= upkeep;
  if (actor.gold < 0) actor.gold = 0;

  const n = actor.citizens.length;
  const needs = {
    food: n * modifiers.food,
    housing: n * modifiers.housing,
    medicine: n * modifiers.medicine,
  };

  let deficit = 0;
  ['food', 'housing', 'medicine'].forEach(res => {
    if (actor.warehouse[res] >= needs[res]) {
      actor.warehouse[res] -= needs[res];
    } else {
      deficit += needs[res] - actor.warehouse[res];
      actor.warehouse[res] = 0;
    }
  });

  logMsg(`${actor.name} производит: 🪙${grossGold} 🌾${grossFood} 🏠${grossHousing} ⚕️${grossMedicine}. Содержание — ${upkeep}🪙.`, 'production');

  if (deficit > 0) {
    // Смягчение механики: дефицит истощает жителей (снимает durability), а не убивает мгновенно
    actor.citizens.forEach(c => {
      c.durability -= 1; 
    });
    
    const passedAway = actor.citizens.filter(c => c.durability <= 0);
    passedAway.forEach(c => {
      if (c.assignedTo) {
        const b = actor.buildings.find(b => b.id === c.assignedTo);
        if (b) b.workerId = null;
      }
    });
    actor.citizens = actor.citizens.filter(c => c.durability > 0);
    
    logMsg(`${actor.name}: из-за нехватки ресурсов жители истощены! Из жизни ушло: ${passedAway.length}.`, 'death');
  }
}

function buyBuilding(actor, type) {
  const def = BUILDING_DEFS[type];
  if (actor.gold < def.cost) return false;
  actor.gold -= def.cost;
  actor.buildings.push({ id: uid('b'), type, durability: def.maxDurability, workerId: null });
  return true;
}

function buyCitizen(actor) {
  if (actor.gold < CITIZEN_COST) return false;
  actor.gold -= CITIZEN_COST;
  actor.citizens.push({ id: uid('c'), durability: CITIZEN_MAX_DURABILITY, assignedTo: null });
  return true;
}

function assignWorker(actor, citizenId, buildingId) {
  const c = actor.citizens.find(c => c.id === citizenId);
  const b = actor.buildings.find(b => b.id === buildingId);
  if (!c || !b || b.workerId) return;
  if (c.assignedTo) {
    const prev = actor.buildings.find(bb => bb.id === c.assignedTo);
    if (prev) prev.workerId = null;
  }
  c.assignedTo = buildingId;
  b.workerId = citizenId;
}

function unassignWorker(actor, buildingId) {
  const b = actor.buildings.find(b => b.id === buildingId);
  if (!b || !b.workerId) return;
  const c = actor.citizens.find(c => c.id === b.workerId);
  if (c) c.assignedTo = null;
  b.workerId = null;
}

/* AI Умный балансировщик цепочек */
function aiBuyPhase(actor) {
  function currentProduction(res) {
    let total = 0;
    actor.buildings.forEach(b => {
      const def = BUILDING_DEFS[b.type];
      if (def.resource === res) total += (b.workerId ? def.boosted : def.base);
    });
    return total;
  }
  
  const n = actor.citizens.length;
  
  // 1. Проверка жизнеобеспечения
  const survivalChecks = [
    { res: 'food', type: 'Farm' },
    { res: 'housing', type: 'House' },
    { res: 'medicine', type: 'Hospital' },
  ];
  for (const { res, type } of survivalChecks) {
    if (actor.warehouse[res] === 0 && currentProduction(res) < n) {
      const def = BUILDING_DEFS[type];
      if (actor.gold >= def.cost) {
        buyBuilding(actor, type);
        logMsg(`${actor.name} строит «${def.label}», защищаясь от кризиса.`, 'ai');
        return;
      }
    }
  }
  
  // 2. Если есть пустое здание, сначала нанимаем человека
  const emptySlot = actor.buildings.find(b => !b.workerId);
  if (emptySlot && actor.gold >= CITIZEN_COST) {
    buyCitizen(actor);
    const newCitizen = actor.citizens[actor.citizens.length - 1];
    assignWorker(actor, newCitizen.id, emptySlot.id);
    logMsg(`${actor.name} нанимает рабочего в здание «${BUILDING_DEFS[emptySlot.type].label}».`, 'ai');
    return;
  }
  
  // 3. Капитализация в Банк (Только при избытке еды/жилья и наличии 16 золота на комбо Банк+Житель)
  const stable = actor.warehouse.food > 2 && actor.warehouse.housing > 2;
  const canAffordCombo = actor.gold >= (BUILDING_DEFS.Bank.cost + CITIZEN_COST);
  
  if (stable && canAffordCombo) {
    buyBuilding(actor, 'Bank');
    logMsg(`${actor.name} открывает «Банк» для накопления богатства.`, 'ai');
    return;
  }
  
  logMsg(`${actor.name} решает сохранить золото до лучших времён.`, 'ai');
}

function checkWin() {
  if (game.gameOver) return;
  if (game.player.gold >= 50) {
    game.gameOver = true; game.winner = 'player';
    logMsg('Вы накопили 50 золота — ваше поселение уходит в вечность!', 'win');
  } else if (game.ai.gold >= 50) {
    game.gameOver = true; game.winner = 'ai';
    logMsg('Соперник (ИИ) накопил 50 золота первым. Ваша эпоха окончена.', 'win');
  }
}

/* Навигация ходов */
function startPlayerTurn() {
  if (game.gameOver || game.phase !== 'ready') return;
  agingPhase(game.player);
  const modifiers = rollDicePhase(game.player);
  productionPhase(game.player, modifiers);
  checkWin();
  if (!game.gameOver) {
    game.phase = 'market';
    game.purchasedThisTurn = false;
  }
  render();
}

function endPlayerMarketPhase() {
  if (game.gameOver || game.phase !== 'market') return;
  game.phase = 'ai-turn';
  render();
  setTimeout(runAiTurn, 550);
}

function runAiTurn() {
  if (game.gameOver) return;
  agingPhase(game.ai);
  const modifiers = rollDicePhase(game.ai);
  productionPhase(game.ai, modifiers);
  checkWin();
  if (!game.gameOver) {
    aiBuyPhase(game.ai);
    checkWin();
  }
  if (!game.gameOver) {
    game.round += 1;
    game.activeTurn = 'player';
    game.phase = 'ready';
  }
  render();
}

function playerBuyBuilding(type) {
  if (game.phase !== 'market' || game.purchasedThisTurn || game.gameOver) return;
  const def = BUILDING_DEFS[type];
  if (game.player.gold < def.cost) return;
  buyBuilding(game.player, type);
  game.purchasedThisTurn = true;
  logMsg(`Вы построили здание «${def.label}».`, 'buy');
  render();
}

function playerBuyCitizen() {
  if (game.phase !== 'market' || game.purchasedThisTurn || game.gameOver) return;
  if (game.player.gold < CITIZEN_COST) return;
  buyCitizen(game.player);
  game.purchasedThisTurn = true;
  logMsg('Вы наняли нового жителя на бирже труда.', 'buy');
  render();
}

function playerAssign(buildingId, citizenId) {
  if (game.phase !== 'market' || game.gameOver || !citizenId) return;
  assignWorker(game.player, citizenId, buildingId);
  render();
}

function playerUnassign(buildingId) {
  if (game.phase !== 'market' || game.gameOver) return;
  unassignWorker(game.player, buildingId);
  render();
}

function restartGame() {
  uidCounter = 1;
  game = newGame();
  document.getElementById('win-modal').classList.add('hidden');
  render();
}

/* =========================================================
   RENDERING ENGINE
========================================================= */
function tickMarks(durability, maxDurability = 4) {
  let html = '<div class="flex gap-0.5">';
  for (let i = 0; i < maxDurability; i++) {
    html += `<span class="tick ${i < durability ? 'bg-brass' : 'bg-panel2 border border-line'}" style="width: 6px;"></span>`;
  }
  html += '</div>';
  return html;
}

function renderComparisonStrip() {
  const el = document.getElementById('comparison-strip');
  function statBlock(actor, accent) {
    return `
      <div class="bg-panel border border-line rounded-lg p-4">
        <div class="flex items-center justify-between mb-3">
          <span class="font-display text-lg text-paper">${actor.name}</span>
          <span class="font-mono text-xl text-brass">🪙 ${actor.gold}</span>
        </div>
        <div class="grid grid-cols-3 gap-2 text-center font-mono text-sm">
          <div class="bg-panel2 rounded p-2">
            <div class="text-moss text-base">🌾 ${actor.warehouse.food}</div>
            <div class="text-[10px] text-muted mt-0.5">Еда</div>
          </div>
          <div class="bg-panel2 rounded p-2">
            <div class="text-teal text-base">🏠 ${actor.warehouse.housing}</div>
            <div class="text-[10px] text-muted mt-0.5">Жильё</div>
          </div>
          <div class="bg-panel2 rounded p-2">
            <div class="text-rose text-base">⚕️ ${actor.warehouse.medicine}</div>
            <div class="text-[10px] text-muted mt-0.5">Медицина</div>
          </div>
        </div>
        <div class="mt-2 text-xs text-muted font-mono">${actor.citizens.length} жит. · ${actor.buildings.length} здан.</div>
        <div class="mt-2 h-1.5 bg-panel2 rounded overflow-hidden">
          <div class="h-full ${accent}" style="width:${Math.min(100, actor.gold / 50 * 100)}%"></div>
        </div>
      </div>`;
  }
  el.innerHTML = statBlock(game.player, 'bg-brass') + statBlock(game.ai, 'bg-rose');
}

function renderDicePanel() {
  const el = document.getElementById('dice-panel');
  if (game.lastDiceRoll) {
    el.innerHTML = `
      <div class="text-6xl leading-none animate-pop">${DICE_FACES[game.lastDiceRoll]}</div>
      <p class="text-xs text-muted mt-3 max-w-[220px]">${game.lastEventText}</p>`;
  } else {
    el.innerHTML = `<p class="text-muted text-sm">Нажмите кнопку ниже, чтобы сделать ход.</p>`;
  }
}

function renderLog() {
  const el = document.getElementById('log-list');
  const colorFor = {
    dice: 'text-brass', production: 'text-muted', death: 'text-danger',
    decay: 'text-[#7A8494]', buy: 'text-moss', ai: 'text-rose', win: 'text-brass font-600',
  };
  el.innerHTML = game.log.map(entry =>
    `<div class="${colorFor[entry.type] || 'text-muted'} animate-rise">· Р${entry.round} — ${entry.msg}</div>`
  ).join('');
}

function renderBuildingCard(actor, b, interactive) {
  const def = BUILDING_DEFS[b.type];
  const producing = b.workerId ? def.boosted : def.base;
  const worker = b.workerId ? actor.citizens.find(c => c.id === b.workerId) : null;
  const unassignedCitizens = actor.citizens.filter(c => !c.assignedTo);

  let workerControl = '';
  if (interactive) {
    if (worker) {
      workerControl = `
        <button data-action="unassign" data-building="${b.id}"
          class="btn-focus text-[11px] font-mono px-2 py-1 rounded bg-panel2 border border-line text-muted hover:text-paper hover:border-brass/60 transition-colors">
          Снять рабочего
        </button>`;
    } else if (unassignedCitizens.length > 0) {
      workerControl = `
        <select data-action="assign-select" data-building="${b.id}"
          class="assign-select text-[11px] font-mono bg-panel2 border border-line rounded px-1.5 py-1 text-paper btn-focus">
          <option value="">+ Назначить рабочего</option>
          ${unassignedCitizens.map(c => `<option value="${c.id}">Рабочий (осталось ${c.durability}х)</option>`).join('')}
        </select>`;
    } else {
      workerControl = `<span class="text-[11px] font-mono text-muted">Нет свободных рук</span>`;
    }
  } else {
    workerControl = worker
      ? `<span class="text-[11px] font-mono text-muted">Занято персоналом</span>`
      : `<span class="text-[11px] font-mono text-muted">Пустует</span>`;
  }

  return `
    <div class="bg-panel2 border border-line rounded-md p-3 flex items-center justify-between gap-3">
      <div class="flex items-center gap-3">
        <span class="text-2xl">${def.icon}</span>
        <div>
          <div class="font-body font-600 text-sm text-paper">${def.label}</div>
          <div class="font-mono text-xs ${COLOR_CLASS[def.color]}">+${producing} ${RESOURCE_LABEL_RU[def.resource]}</div>
        </div>
      </div>
      <div class="flex flex-col items-end gap-1.5">
        ${tickMarks(b.durability, def.maxDurability)}
        ${workerControl}
      </div>
    </div>`;
}

function renderTown(actor, containerId, interactive) {
  const el = document.getElementById(containerId);
  const unassigned = actor.citizens.filter(c => !c.assignedTo);
  el.innerHTML = `
    <div class="space-y-2">
      ${actor.buildings.map(b => renderBuildingCard(actor, b, interactive)).join('')}
    </div>
    ${unassigned.length > 0 ? `
      <div class="flex items-center gap-2 flex-wrap pt-1">
        <span class="text-xs text-muted font-mono">Свободные люди:</span>
        ${unassigned.map(c => `<span class="text-xs font-mono px-2 py-0.5 rounded bg-panel2 border border-line text-paper">🧍 раунд ${c.durability}</span>`).join('')}
      </div>` : ''}
  `;
}

function renderMarket() {
  const el = document.getElementById('market-list');
  const hint = document.getElementById('market-hint');
  const canBuy = game.phase === 'market' && !game.purchasedThisTurn && !game.gameOver;
  hint.textContent = game.phase === 'market'
    ? (game.purchasedThisTurn ? 'Покупка в этом ходу уже сделана' : 'Доступна одна покупка в этом ходу')
    : 'Доступно во время вашей фазы рынка';

  const cards = Object.entries(BUILDING_DEFS).map(([type, def]) => {
    const affordable = game.player.gold >= def.cost;
    const disabled = !canBuy || !affordable;
    return `
      <div class="min-w-[160px] bg-panel2 border border-line rounded-md p-3 flex flex-col justify-between gap-2 shrink-0">
        <div>
          <div class="flex items-center gap-2">
            <span class="text-2xl">${def.icon}</span>
            <span class="font-body font-600 text-sm">${def.label}</span>
          </div>
          <div class="font-mono text-[11px] ${COLOR_CLASS[def.color]} mt-2">
            База: +${def.base}<br>
            С рабочим: +${def.boosted}<br>
            Срок: ${def.maxDurability} ходов<br>
            Расходы: ${def.maint}🪙/ход
          </div>
        </div>
        <button data-action="buy" data-type="${type}" ${disabled ? 'disabled' : ''}
          class="btn-focus mt-1 text-xs font-mono px-2 py-1.5 rounded bg-brass text-ink font-600 hover:bg-[#e3bb52] disabled:opacity-30 disabled:cursor-not-allowed transition-colors">
          Купить — 🪙${def.cost}
        </button>
      </div>`;
  }).join('');

  const citizenAffordable = game.player.gold >= CITIZEN_COST;
  const citizenDisabled = !canBuy || !citizenAffordable;
  const citizenCard = `
    <div class="min-w-[160px] bg-panel2 border border-line rounded-md p-3 flex flex-col justify-between gap-2 shrink-0">
      <div>
        <div class="flex items-center gap-2">
          <span class="text-2xl">🧍</span>
          <span class="font-body font-600 text-sm">Рабочий</span>
        </div>
        <div class="font-mono text-[11px] text-muted mt-2">
          Увеличивает отдачу зданий.<br>
          Живёт ${CITIZEN_MAX_DURABILITY} ходов.<br>
          Потребляет ресурсы.
        </div>
      </div>
      <button data-action="buy" data-type="Citizen" ${citizenDisabled ? 'disabled' : ''}
        class="btn-focus mt-1 text-xs font-mono px-2 py-1.5 rounded bg-brass text-ink font-600 hover:bg-[#e3bb52] disabled:opacity-30 disabled:cursor-not-allowed transition-colors">
        Нанять — 🪙${CITIZEN_COST}
      </button>
    </div>`;

  el.innerHTML = cards + citizenCard;
}

function renderMainButton() {
  const btn = document.getElementById('main-btn');
  if (game.gameOver) {
    btn.textContent = 'Хроника завершена';
    btn.disabled = true;
    return;
  }
  if (game.phase === 'ready') {
    btn.textContent = 'Бросить кубик и начать ход';
    btn.disabled = false;
  } else if (game.phase === 'market') {
    btn.textContent = 'Закончить ход (передать ИИ)';
    btn.disabled = false;
  } else {
    btn.textContent = 'Соперник (ИИ) управляет городом…';
    btn.disabled = true;
  }
}

function renderRoundBadge() {
  const el = document.getElementById('round-badge');
  const phaseLabel = { ready: 'Готов к ходу', market: 'Ваша фаза рынка', 'ai-turn': 'Ход ИИ' }[game.phase];
  el.textContent = `Раунд ${game.round} · ${phaseLabel}`;
}

function renderWinModal() {
  const modal = document.getElementById('win-modal');
  if (!game.gameOver) { modal.classList.add('hidden'); return; }
  modal.classList.remove('hidden');
  const title = document.getElementById('win-title');
  const sub = document.getElementById('win-sub');
  if (game.winner === 'player') {
    title.textContent = 'Победа — Золотой век!';
    sub.textContent = `Вы триумфально накопили ${game.player.gold} золота за ${game.round} раундов.`;
  } else {
    title.textContent = 'Поражение — Вы в тени истории';
    sub.textContent = `ИИ опередил вас, накопив ${game.ai.gold} золота за ${game.round} раундов.`;
  }
}

function render() {
  renderRoundBadge();
  renderComparisonStrip();
  renderDicePanel();
  renderLog();
  renderMainButton();
  renderTown(game.player, 'player-town', true);
  renderTown(game.ai, 'ai-town', false);
  renderMarket();
  renderWinModal();
}

/* =========================================================
   EVENT DELEGATION
========================================================= */
document.getElementById('app').addEventListener('click', (e) => {
  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  const action = btn.dataset.action;
  if (action === 'main-btn') {
    if (game.phase === 'ready') startPlayerTurn();
    else if (game.phase === 'market') endPlayerMarketPhase();
  } else if (action === 'buy') {
    if (btn.dataset.type === 'Citizen') playerBuyCitizen();
    else playerBuyBuilding(btn.dataset.type);
  } else if (action === 'unassign') {
    playerUnassign(btn.dataset.building);
  }
});

document.getElementById('app').addEventListener('change', (e) => {
  const sel = e.target.closest('[data-action="assign-select"]');
  if (!sel) return;
  playerAssign(sel.dataset.building, sel.value);
});

document.getElementById('win-modal').addEventListener('click', (e) => {
  const btn = e.target.closest('[data-action="restart"]');
  if (btn) restartGame();
});

/* Первичный запуск */
render();
</script>
</body>
</html>
