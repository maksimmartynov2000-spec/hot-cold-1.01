  <style>
    /* Предотвращаем масштабирование и выделение */
    * {
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      box-sizing: border-box;
    }
    input, textarea {
      -webkit-user-select: text;
      user-select: text;
    }
    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      background: #0d1117;
      color: #c9d1d9;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden;
    }
    #app {
      display: flex; flex-direction: column;
      width: 100%; height: 100%;
      max-width: 600px; margin: 0 auto;
      background: #161b22;
      position: relative;
    }
    /* Шапка */
    header {
      background: #21262d;
      padding: 10px 15px;
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid #30363d;
      flex-shrink: 0;
    }
    h1 { margin: 0; font-size: 1.25rem; color: #f0f6fc; font-weight: 600; }
    select {
      background: #30363d; color: #c9d1d9;
      border: 1px solid #8b949e; border-radius: 6px;
      padding: 5px 10px; font-size: 0.9rem; outline: none;
    }
    /* Контент */
    .content {
      flex: 1; overflow-y: auto;
      padding: 15px; display: flex; flex-direction: column; gap: 15px;
      -webkit-overflow-scrolling: touch;
    }
    .card {
      background: #21262d; border: 1px solid #30363d; border-radius: 12px; padding: 15px;
    }
    .rules-p { margin: 0 0 8px 0; font-size: 0.95rem; line-height: 1.4; color: #8b949e; }
    .rules-p strong { color: #f0f6fc; }
    /* Панель попыток */
    .attempts-bar {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 1.05rem; font-weight: 600; color: #f0f6fc;
    }
    .btn-icon {
      background: none; border: none; font-size: 1.35rem; cursor: pointer; padding: 5px; line-height: 1;
    }
    /* Сетка легенды */
    .legend-grid {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 5px;
    }
    .legend-item {
      display: flex; justify-content: space-between; align-items: center;
      background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 6px 10px; font-size: 0.85rem;
    }
    .l-label { font-weight: 600; }
    .l-range { color: #8b949e; font-variant-numeric: tabular-nums; }
    /* Секции ввода */
    .input-group { display: flex; gap: 10px; margin-top: 5px; }
    input[type="number"] {
      flex: 1; background: #0d1117; border: 1px solid #30363d; border-radius: 8px;
      color: #f0f6fc; padding: 12px; font-size: 1.1rem; outline: none;
      text-align: center; -moz-appearance: textfield;
    }
    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    input:focus { border-color: #58a6ff; }
    button.btn-primary {
      background: #238636; color: #ffffff; border: none; border-radius: 8px;
      padding: 0 20px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s;
    }
    button.btn-primary:hover { background: #2ea043; }
    /* Результаты */
    .feedback-panel { text-align: center; padding: 12px; border-radius: 8px; font-weight: bold; font-size: 1.1rem; }
    .history-title { font-size: 1rem; font-weight: 600; color: #f0f6fc; margin: 0 0 10px 0; }
    .history-list { display: flex; flex-direction: column; gap: 8px; }
    .history-item {
      display: flex; justify-content: space-between; align-items: center;
      background: #0d1117; border: 1px solid #30363d; border-radius: 8px;
      padding: 10px 12px; font-variant-numeric: tabular-nums;
    }
    .h-num { font-weight: 600; color: #58a6ff; }
    .h-text { flex: 1; margin-left: 15px; font-weight: 500; }
    .h-arrow { font-size: 0.9rem; font-weight: bold; margin-left: 10px; }
    /* Модалки / Секции */
    .hidden { display: none !important; }
    .final-box {
      background: #382a12; border: 1px solid #ce911f; border-radius: 12px; padding: 15px;
      text-align: center; display: flex; flex-direction: column; gap: 10px;
    }
    .final-box p { margin: 0; font-size: 1rem; color: #f0f6fc; }
    .result-box {
      text-align: center; padding: 20px 15px; border-radius: 12px;
      font-size: 1.2rem; font-weight: bold; line-height: 1.5;
    }
    .result-win { background: rgba(35, 134, 54, 0.2); border: 1px solid #238636; color: #56d364; }
    .result-lose { background: rgba(248, 81, 73, 0.2); border: 1px solid #f85149; color: #ff7b72; }
    .btn-reset {
      margin-top: 15px; background: #21262d; color: #c9d1d9; border: 1px solid #30363d;
      border-radius: 8px; padding: 10px 20px; font-size: 1rem; font-weight: 600; cursor: pointer;
    }
    .btn-reset:hover { background: #30363d; color: #f0f6fc; }
  </style>
</head>
<body>

<div id="app">
  <header>
    <h1 id="uiTitle">Горячо или Холодно</h1>
    <select id="langSwitcher" onchange="switchLang(this.value)">
      <option value="ru">Русский</option>
      <option value="en">English</option>
    </select>
  </header>

  <div class="content">
    <div class="card">
      <p class="rules-p" id="uiRules1">Я загадал число от <strong>1 до 1000</strong>.</p>
      <p class="rules-p" id="uiRules2">У тебя есть <strong>10 попыток</strong>, чтобы сузить диапазон. После этого нужно угадать точное число.</p>
    </div>

    <div class="attempts-bar">
      <span id="attemptsLabel">Попытка: 1 / 10</span>
      <button class="btn-icon" onclick="resetGame()">🔄</button>
    </div>

    <div class="card" style="padding: 10px;">
      <div class="legend-grid" id="legendGrid"></div>
    </div>

    <div id="guessSection" class="card">
      <div class="input-group">
        <input type="number" id="guessInput" placeholder="1-1000" min="1" max="1000" />
        <button class="btn-primary" id="uiBtnGuess" onclick="handleGuess()">ОК</button>
      </div>
    </div>

    <div id="feedbackPanel" class="feedback-panel hidden"></div>

    <div id="finalBox" class="final-box hidden">
      <p id="uiFinalPrompt">10 попыток исчерпаны! Какое число было загадано?</p>
      <div class="input-group">
        <input type="number" id="finalInput" placeholder="?" min="1" max="1000" />
        <button class="btn-primary" style="background:#ce911f;" id="uiBtnFinal" onclick="submitFinal()">ОК</button>
      </div>
    </div>

    <div id="resultBox" class="result-box hidden">
      <div id="resultText"></div>
      <button class="btn-reset" id="uiBtnReset" onclick="resetGame()">Играть снова</button>
    </div>

    <div id="historySection" class="card hidden">
      <h3 class="history-title" id="uiHistoryTitle">История попыток</h3>
      <div class="history-list" id="historyList"></div>
    </div>
  </div>
</div>

    { min: 21,  max: 40,   labelIndex: 3, color: '#daaa3f', rangeSign: '21–40' },
    { min: 11,  max: 20,   labelIndex: 4, color: '#ff9e3b', rangeSign: '11–20' },
    { min: 5,   max: 10,   labelIndex: 5, color: '#ff6a00', rangeSign: '5–10' },
    { min: 1,   max: 4,    labelIndex: 6, color: '#f85149', rangeSign: '1–4' },
    { min: 0,   max: 0,    labelIndex: 7, color: '#56d364', rangeSign: '0' }
  ];

  let currentLang = 'ru';
  let secret = Math.floor(Math.random() * 1000) + 1;
  let history = [];
  let gameOver = false;
  let gameOverType = null;

  function switchLang(lang) {
    currentLang = lang;
    document.getElementById('langSwitcher').value = lang;
    
    document.getElementById('uiTitle').innerText = i18n[lang].title;
    document.getElementById('docTitle').innerText = i18n[lang].title;
    document.getElementById('uiRules1').innerHTML = i18n[lang].rules1;
    document.getElementById('uiRules2').innerHTML = i18n[lang].rules2;
    document.getElementById('uiBtnGuess').innerText = i18n[lang].btnGuess;
    document.getElementById('uiBtnFinal').innerText = i18n[lang].btnFinal;
    document.getElementById('uiBtnReset').innerText = i18n[lang].btnReset;
    document.getElementById('uiFinalPrompt').innerText = i18n[lang].finalPrompt;
    document.getElementById('uiHistoryTitle').innerText = i18n[lang].historyTitle;
    document.getElementById('guessInput').placeholder = i18n[lang].placeholder;
    document.getElementById('finalInput').placeholder = '?';

    updateAttemptsLabel();
    buildLegend();
    renderHistory();

    if (gameOver) {
      showFinalResultUI();
    } else if (history.length > 0) {
      const lastDiff = history[history.length - 1].diff;
      showFeedbackPanel(lastDiff);
    }
  }

  function updateAttemptsLabel() {
    const lbl = document.getElementById('attemptsLabel');
    if (history.length < 10 && !gameOver) {
      lbl.innerText = i18n[currentLang].attempts.replace('{x}', history.length + 1);
    } else {
      lbl.innerText = i18n[currentLang].attempts.replace('{x}', 10);
    }
  }

  function handleGuess() {
    if (gameOver || history.length >= 10) return;

    const input = document.getElementById('guessInput');
    const val = parseInt(input.value, 10);
    if (isNaN(val) || val < 1 || val > 1000) return;

    const diff = Math.abs(secret - val);
    history.push({ num: val, diff: diff });
    input.value = '';

    showFeedbackPanel(diff);
    renderHistory();
    updateAttemptsLabel();

    if (diff === 0) {
      gameOver = true;
      gameOverType = 'win';
      showFinalResultUI();
      return;
    }

    if (history.length >= 10) {
      document.getElementById('guessSection').classList.add('hidden');
      document.getElementById('feedbackPanel').classList.add('hidden');
      document.getElementById('finalBox').classList.remove('hidden');
      document.getElementById('finalInput').focus();
    }
  }

  function showFeedbackPanel(diff) {
    const panel = document.getElementById('feedbackPanel');
    panel.classList.remove('hidden');
    
    let matched = FEEDBACK_META[0];
    for (const meta of FEEDBACK_META) {
      if (diff >= meta.min && diff <= meta.max) {
        matched = meta;
        break;
      }
    }
    const labelText = i18n[currentLang].labels[matched.labelIndex];
    panel.innerText = labelText;
    panel.style.background = matched.color + '22';
    panel.style.border = `1px solid ${matched.color}`;
    panel.style.color = matched.color;
  }

  function submitFinal() {
    if (gameOver || history.length < 10) return;
    const input = document.getElementById('finalInput');
    const val = parseInt(input.value, 10);
    if (isNaN(val)) return;

    gameOver = true;
    gameOverType = (val === secret) ? 'win' : 'lose';
    document.getElementById('finalBox').classList.add('hidden');
    showFinalResultUI();
  }

  function showFinalResultUI() {
    const box = document.getElementById('resultBox');
    const txt = document.getElementById('resultText');
    box.classList.remove('hidden');
    document.getElementById('guessSection').classList.add('hidden');
    document.getElementById('feedbackPanel').classList.add('hidden');
    document.getElementById('finalBox').classList.add('hidden');

    if (gameOverType === 'win') {
      box.className = "result-box result-win";
      txt.innerHTML = i18n[currentLang].winText
        .replace('{x}', secret)
        .replace('{attempts}', history.length);
    } else {
      box.className = "result-box result-lose";
      const lastGuess = (history.length >= 10) ? document.getElementById('finalInput').value : history[history.length-1].num;
      txt.innerHTML = i18n[currentLang].loseText
        .replace('{x}', secret)
        .replace('{y}', lastGuess || '?');
    }
  }

  function renderHistory() {
    const sec = document.getElementById('historySection');
    const list = document.getElementById('historyList');
    if (history.length === 0) {
      sec.classList.add('hidden');
      return;
    }
    sec.classList.remove('hidden');
    list.innerHTML = '';

    history.forEach((item, idx) => {
      let matched = FEEDBACK_META[0];
      for (const meta of FEEDBACK_META) {
        if (item.diff >= meta.min && item.diff <= meta.max) {
          matched = meta;
          break;
        }
      }
      const labelText = i18n[currentLang].labels[matched.labelIndex];
      const arrow = (item.num < secret) ? '▲' : (item.num > secret ? '▼' : '★');

      const div = document.createElement('div');
      div.className = 'history-item';
      div.innerHTML = `
        <span class="h-num">#${idx + 1}</span>
        <span class="h-text">${item.num} — <span style="color:${matched.color}">${labelText}</span></span>
        <span class="h-arrow" style="color:${matched.color}">${arrow}</span>
      `;
      list.appendChild(div);
    });
  }

  function resetGame() {
    secret = Math.floor(Math.random() * 1000) + 1;
    history = [];
    gameOver = false;
    gameOverType = null;
    document.getElementById('feedbackPanel').classList.add('hidden');
    document.getElementById('finalBox').classList.add('hidden');
    document.getElementById('resultBox').classList.add('hidden');
    document.getElementById('historySection').classList.add('hidden');
    document.getElementById('guessSection').classList.remove('hidden');
    document.getElementById('guessInput').value = '';
    document.getElementById('finalInput').value = '';
    updateAttemptsLabel();
  }

  function buildLegend() {
    const grid = document.getElementById('legendGrid');
    grid.innerHTML = '';
    const labels = i18n[currentLang].labels;
    FEEDBACK_META.slice(0, 8).forEach(meta => {
      const item = document.createElement('div');
      item.className = 'legend-item';
      const labelText = labels[meta.labelIndex];
      item.innerHTML = `<span class=\"l-label\" style=\"color:${meta.color}\">${labelText}</span><span class=\"l-range\">${meta.rangeSign}</span>`;
      grid.appendChild(item);
    });
  }

  document.getElementById('guessInput').addEventListener('keydown', e => { if (e.key === 'Enter') handleGuess(); });
  document.getElementById('finalInput').addEventListener('keydown', e => { if (e.key === 'Enter') submitFinal(); });

  document.getElementById('langSwitcher').value = currentLang;
  switchLang(currentLang);
</script>

</body>
</html>
