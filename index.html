            this.isEternal = false;
            
            this.upgradesApplied = []; // Сюда складываем ID примененных улучшений
        }

        get turnsLeft() {
            if (this.isEternal) return Infinity;
            return Math.max(0, this.maxLifespan - this.age);
        }

        get isExpired() {
            if (this.isEternal) return false;
            return this.age >= this.maxLifespan;
        }
    }

    // =========================================================================
    // ДВИЖОК СИНЕРГИЙ (ЯДРО ИГРЫ)

    class SynergyEngine {
        /**
         * Вычисляет все цепочки и бонусы на поле.
         * Возвращает детальную карту распределения бонусов для отрисовки подсказок.
         */
        static calculate(businesses, globals) {
            // Сброс и инициализация доходов к базовым значениям
            businesses.forEach(b => {
                b.income = b.baseIncome;
            });

            const synergyLogs = []; // Список для хранения информации о том, кто кого бафнул

            // 1. СИСТЕМНЫЕ СИНЕРГИИ МЕЖДУ БИЗНЕСАМИ (ЦЕПОЧКИ ПОСТАВОК)
            // Ищем пары на поле и применяем взаимные эффекты
            
            const hasBusiness = (id) => businesses.some(b => b.cardId === id);
            const countTag = (tag) => businesses.filter(b => b.tags.includes(tag)).length;

            businesses.forEach(b => {
                // Цепочка 1: Ферма (b_farm) -> Мельница (b_mill) -> Пекарня (b_bakery) -> Кофейня (b_coffee) / Ресторан (b_restaurant)
                if (b.cardId === 'b_bakery' && hasBusiness('b_farm')) {
                    b.income += 10;
                    synergyLogs.push({ from: 'Ферма', to: b.id, amount: 10, reason: 'Поставка свежего зерна' });
                }
                if (b.cardId === 'b_coffee' && hasBusiness('b_bakery')) {
                    b.income += 8;
                    synergyLogs.push({ from: 'Пекарня', to: b.id, amount: 8, reason: 'Совместное меню выпечки' });
                }
                if (b.cardId === 'b_restaurant' && hasBusiness('b_farm')) {
                    b.income += 15;
                    synergyLogs.push({ from: 'Ферма', to: b.id, amount: 15, reason: 'Концепция Farm-to-Table' });
                }

                // Цепочка 2: Завод (b_factory) -> Логистика (b_logistics) -> Онлайн-магазин (b_store) / Супермаркет (b_supermarket)
                if (b.cardId === 'b_logistics' && hasBusiness('b_factory')) {
                    b.income += 15;
                    synergyLogs.push({ from: 'Завод', to: b.id, amount: 15, reason: 'Крупный контракт на перевозки' });
                }
                if ((b.cardId === 'b_store' || b.cardId === 'b_supermarket') && hasBusiness('b_logistics')) {
                    b.income += 12;
                    synergyLogs.push({ from: 'Логистика', to: b.id, amount: 12, reason: 'Быстрая доставка товаров' });
                }

                // Цепочка 3: IT-Стартап (b_startup) -> Облачный сервис (b_cloud) -> AI Лаборатория (b_ai)
                if (b.cardId === 'b_cloud' && hasBusiness('b_startup')) {
                    b.income += 20;
                    synergyLogs.push({ from: 'IT-Стартап', to: b.id, amount: 20, reason: 'Потребление облачных мощностей' });
                }
                if (b.cardId === 'b_ai' && hasBusiness('b_cloud')) {
                    b.income += 25;
                    synergyLogs.push({ from: 'Облачный сервис', to: b.id, amount: 25, reason: 'Дата-центры для обучения моделей' });
                }
                if (b.cardId === 'b_startup' && hasBusiness('b_ai')) {
                    b.income += 18;
                    synergyLogs.push({ from: 'AI Лаборатория', to: b.id, amount: 18, reason: 'Интеграция передового ИИ' });
                }

                // Кросс-тэговые синергии от количества зданий на поле
                // Например, Логистика получает +4 за каждый Production на поле
                if (b.tags.includes(Tags.LOGISTICS)) {
                    let prodCount = countTag(Tags.PRODUCTION);
                    if (prodCount > 0) {
                        b.income += prodCount * 5;
                        synergyLogs.push({ from: `Производства (x${prodCount})`, to: b.id, amount: prodCount * 5, reason: 'Обслуживание фабрик' });
                    }
                }
                
                // Маркетинговое агентство получает +4 за каждый Retail на поле
                if (b.cardId === 'b_marketing') {
                    let retailCount = countTag(Tags.RETAIL);
                    if (retailCount > 0) {
                        b.income += retailCount * 6;
                        synergyLogs.push({ from: `Ритейл (x${retailCount})`, to: b.id, amount: retailCount * 6, reason: 'Рекламные кампании' });
                    }
                }
            });

            // 2. ПРИМЕНЕНИЕ ЛОКАЛЬНЫХ УЛУЧШЕНИЙ НА КАРТАХ
            // Рассчитываются поверх базовых и цепочечных
            businesses.forEach(b => {
                b.upgradesApplied.forEach(upgCardId => {
                    const upgCard = CARD_DATABASE.find(c => c.id === upgCardId);
                    if (!upgCard) return;

                    let eff = upgCard.effects;
                    
                    // Плоский бонус к доходу
                    if (eff.incomeBonus) {
                        b.income += eff.incomeBonus;
                        synergyLogs.push({ from: upgCard.title, to: b.id, amount: eff.incomeBonus, reason: 'Модификатор улучшения' });
                    }

                    // Специфичные бонусы по тегам внутри улучшения
                    if (eff.tagSpecific && b.tags.includes(eff.tagSpecific.tag)) {
                        b.income += eff.tagSpecific.incomeBonus;
                        synergyLogs.push({ from: upgCard.title, to: b.id, amount: eff.tagSpecific.incomeBonus, reason: `Спец-бонус для ${eff.tagSpecific.tag}` });
                    }

                    if (eff.tagSpecificOr) {
                        let matches = eff.tagSpecificOr.tags.some(t => b.tags.includes(t));
                        if (matches) {
                            b.income += eff.tagSpecificOr.incomeBonus;
                            synergyLogs.push({ from: upgCard.title, to: b.id, amount: eff.tagSpecificOr.incomeBonus, reason: 'Профильный буст технологии' });
                        }
                    }

                    // Мультипликаторы
                    if (eff.incomeMultiplier) {
                        let addition = b.baseIncome * (eff.incomeMultiplier - 1);
                        b.income += addition;
                        synergyLogs.push({ from: upgCard.title, to: b.id, amount: addition, reason: 'Масштабирование (Мультипликатор)' });
                    }
                });
            });

            // 3. ПРИМЕНЕНИЕ ГЛОБАЛЬНЫХ КАРТ УЛУЧШЕНИЙ
            globals.forEach(gCardId => {
                const gCard = CARD_DATABASE.find(c => c.id === gCardId);
                if (!gCard) return;

                let eff = gCard.effects;

                businesses.forEach(b => {
                    if (eff.type === 'all_flat') {
                        b.income += eff.bonus;
                        synergyLogs.push({ from: gCard.title, to: b.id, amount: eff.bonus, reason: 'Глобальный закон' });
                    }
                    if (eff.type === 'tag_flat') {
                        let hasTag = eff.tags.some(t => b.tags.includes(t));
                        if (hasTag) {
                            b.income += eff.bonus;
                            synergyLogs.push({ from: gCard.title, to: b.id, amount: eff.bonus, reason: 'Отраслевая субсидия' });
                        }
                    }
                    if (eff.type === 'tag_multiplier') {
                        let hasTag = eff.tags.some(t => b.tags.includes(t));
                        if (hasTag) {
                            let amt = Math.floor(b.income * (eff.multiplier - 1));
                            b.income += amt;
                            synergyLogs.push({ from: gCard.title, to: b.id, amount: amt, reason: 'Глобальный рост индустрии' });
                        }
                    }
                    if (eff.type === 'upgrade_boost') {
                        let upgCount = b.upgradesApplied.length;
                        if (upgCount > 0) {
                            let amt = upgCount * eff.bonus;
                            b.income += amt;
                            synergyLogs.push({ from: gCard.title, to: b.id, amount: amt, reason: `Эффективность менеджмента (x${upgCount})` });
                        }
                    }
                });
            });

            // Дополнительный буст от Инновационного Хаба, если он построен
            if (globals.includes('g_synergy_hub')) {
                // Увеличиваем каждую найденную синергию в логах, кроме самих глобалок и прямых улучшений
                synergyLogs.forEach(log => {
                    if (!log.reason.includes('Глобальный') && !log.reason.includes('Модификатор')) {
                        let targetBiz = businesses.find(b => b.id === log.to);
                        if (targetBiz) {
                            targetBiz.income += 5;
                            log.amount += 5;
                            log.reason += ' + Инновационный Хаб';
                        }
                    }
                });
            }

            return synergyLogs;
        }
    }

    // =========================================================================
    // КЛАСС УПРАВЛЕНИЯ СОСТОЯНИЕМ ИГРЫ (STATE MANAGEMENT)
    // =========================================================================
    class GameEngine {
        constructor() {
            this.capital = 150;     // Стартовый капитал
            this.currentTurn = 1;   // Текущий ход
            this.maxTurns = 30;     // Лимит ходов
            
            this.businesses = [];   // Активные бизнесы на поле (BusinessInstance)
            this.globals = [];      // ID купленных глобальных карт
            this.hand = [];         // Карты в руке (Card экземпляры)
            this.deck = [];         // Колода (оставшиеся карты)
            
            this.synergyLogs = [];  // Логи рассчитанных связей
            this.selectedCardIndex = null; // Выбранная карта в руке для розыгрыша
            this.gameEnded = false;
            
            this.initDeck();
            this.drawHand(5); // Берем стартовую руку
        }

        initDeck() {
            // Перемешиваем глубокую копию базы карт
            this.deck = [...CARD_DATABASE].sort(() => Math.random() - 0.5);
        }

        drawHand(count) {
            while (this.hand.length < count && this.deck.length > 0) {
                this.hand.push(this.deck.pop());
            }
        }

        getCardCost(card) {
            let cost = card.cost;
            // Проверяем глобальный модификатор Бизнес-акселератора
            if (card.type === CardTypes.UPGRADE && this.globals.includes('g_accelerator')) {
                cost = Math.max(5, cost - 10);
            }
            return cost;
        }

        selectCard(index) {
            if (this.gameEnded) return;
            this.selectedCardIndex = (this.selectedCardIndex === index) ? null : index;
            this.updateSystem();
        }

        playCard(targetBusinessId = null) {
            if (this.selectedCardIndex === null || this.gameEnded) return false;
            
            const card = this.hand[this.selectedCardIndex];
            const cost = this.getCardCost(card);

            if (this.capital < cost) {
                alert('Недостаточно капитала для этого стратегического решения!');
                return false;
            }

            // Розыгрыш в зависимости от типа
            if (card.type === CardTypes.BUSINESS) {
                // Создаем инстанс бизнеса
                const newBiz = new BusinessInstance(card);
                // Проверяем глобальный бонус долголетия
                if (this.globals.includes('g_green_energy')) {
                    newBiz.maxLifespan += 2;
                }
                this.businesses.push(newBiz);
            } 
            else if (card.type === CardTypes.GLOBAL) {
                if (this.globals.includes(card.id)) {
                    alert('Данное стратегическое улучшение уже действует во всей империи!');
                    return false;
                }
                this.globals.push(card.id);
            } 
            else if (card.type === CardTypes.UPGRADE) {
                if (!targetBusinessId) {
                    alert('Выберите предприятие на поле для применения этого улучшения.');
                    return false;
                }
                const target = this.businesses.find(b => b.id === targetBusinessId);
                if (!target) return false;

                // Проверка ограничений тегов (валидация целей)
                let eff = card.effects;
                if (eff.restrictTag && !target.tags.includes(eff.restrictTag)) {
                    alert(`Это улучшение применимо только к бизнесу с тегом ${eff.restrictTag}`);
                    return false;
                }
                if (eff.restrictTagsOr && !eff.restrictTagsOr.some(t => target.tags.includes(t))) {
                    alert(`Это улучшение требует один из тегов: ${eff.restrictTagsOr.join(', ')}`);
                    return false;
                }

                // Применяем эффекты мгновенного действия при интеграции
                if (eff.resetAge) target.age = 0;
                if (eff.lifespanBonus) target.maxLifespan += eff.lifespanBonus;
                if (eff.makeEternal) target.isEternal = true;

                target.upgradesApplied.push(card.id);
            }

            // Списываем капитал, убираем карту из руки
            this.capital -= cost;
            this.hand.splice(this.selectedCardIndex, 1);
            this.selectedCardIndex = null;

            this.updateSystem();
            return true;
        }

        // Кнопка продажи компании до ее закрытия
        sellBusiness(id) {
            if (this.gameEnded) return;
            const idx = this.businesses.findIndex(b => b.id === id);
            if (idx === -1) return;

            const b = this.businesses[idx];
            // Ликвидационная стоимость зависит от оставшегося срока службы и текущего дохода
            let compensation = Math.floor((b.income * 1.5) + (b.turnsLeft === Infinity ? 40 : b.turnsLeft * 4));
            this.capital += compensation;
            
            this.businesses.splice(idx, 1);
            this.updateSystem();
        }

        endTurn() {
            if (this.gameEnded) return;

            // 1. Компании генерируют прибыль
            this.businesses.forEach(b => {
                this.capital += b.income;
                b.age += 1; // Увеличиваем возраст
            });

            // 2. Отсев закрывшихся компаний
            this.businesses = this.businesses.filter(b => !b.isExpired);

            // 3. Переход хода и добор карт
            this.currentTurn += 1;
            this.drawHand(5);

            if (this.currentTurn > this.maxTurns) {
                this.gameEnded = true;
            }

            this.selectedCardIndex = null;
            this.updateSystem();
        }

        // Пересчет баланса синергий
        updateSystem() {
            this.synergyLogs = SynergyEngine.calculate(this.businesses, this.globals);
            if (window.renderApp) {
                window.renderApp();
            }
        }

        calculateEmpireValue() {
            // Итоговый счет: капитал + капитализация всех живых бизнесов
            let val = this.capital;
            this.businesses.forEach(b => {
                val += (b.income * 3); // Мультипликатор оценки стоимости компании
            });
            return val;
        }
    }

    // Инициализируем глобальный объект игры
    const Game = new GameEngine();
    Game.updateSystem();
