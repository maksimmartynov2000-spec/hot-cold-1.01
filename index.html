<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Oasis: Capital</title>
    <style>
        :root {
            --bg-dark: #0a0b10;
            --panel-bg: rgba(20, 22, 37, 0.7);
            --neon-blue: #00f0ff;
            --neon-green: #39ff14;
            --neon-purple: #bd00ff;
            --text-light: #e2e8f0;
            --shadow-blue: 0 0 15px rgba(0, 240, 255, 0.4);
            --shadow-green: 0 0 15px rgba(57, 255, 20, 0.4);
            --shadow-purple: 0 0 15px rgba(189, 0, 255, 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: radial-gradient(circle at center, #16192b 0%, #0a0b10 100%);
        }

        /* Хедер с ресурсами */
        header {
            display: flex;
            justify-content: space-around;
            padding: 15px 10px;
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 10;
        }

        .resource-card {
            text-align: center;
            flex: 1;
            margin: 0 5px;
            padding: 8px;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid transparent;
            transition: all 0.3s ease;
        }

        .resource-card.blue { border-color: var(--neon-blue); box-shadow: var(--shadow-blue); }
        .resource-card.green { border-color: var(--neon-green); box-shadow: var(--shadow-green); }
        .resource-card.purple { border-color: var(--neon-purple); box-shadow: var(--shadow-purple); }

        .res-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; opacity: 0.8; }
        .res-val { font-size: 1.2rem; font-weight: bold; margin-top: 4px; }
        .res-inc { font-size: 0.7rem; opacity: 0.7; }

        /* Игровое поле / Холст */
        .game-space {
            flex: 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #cityCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Панель управления (Кнопки) */
        .control-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px;
            z-index: 10;
            max-height: 40vh;
            overflow-y: auto;
        }

        .panel-title {
            font-size: 0.9rem;
            text-transform: uppercase;
            margin-bottom: 10px;
            letter-spacing: 1px;
            color: #8a99ad;
        }

        .build-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .btn-build {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 12px;
            color: white;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-build:active {
            transform: scale(0.97);
        }

        .btn-build.available:hover, .btn-build.available:active {
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-build .name { font-size: 0.9rem; font-weight: bold; display: block; }
        .btn-build .cost { font-size: 0.75rem; color: #a0aec0; margin-top: 4px; display: block; }
        .btn-build .count { 
            position: absolute; right: 10px; top: 10px; 
            font-size: 0.8rem; font-weight: bold; opacity: 0.6;
        }

        /* Индивидуальные стили кнопок при доступности */
        .btn-build[data-type="reactor"].available { border-color: var(--neon-blue); }
        .btn-build[data-type="farm"].available { border-color: var(--neon-green); }
        .btn-build[data-type="hub"].available { border-color: var(--neon-purple); }

        /* Анимационный эффект вспышки при клике */
        @keyframes pulse-eff {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.05); opacity: 0; }
        }
        
        .pulse-active {
            animation: pulse-eff 0.3s ease-out;
        }
    </style>
</head>
<body>

    <header>
        <div class="resource-card blue" id="card-energy">
            <div class="res-label">Энергия</div>
            <div class="res-val" id="val-energy">100</div>
            <div class="res-inc" id="inc-energy">+5/с</div>
        </div>
        <div class="resource-card green" id="card-materials">
            <div class="res-label">Био-Материалы</div>
            <div class="res-val" id="val-materials">50</div>
            <div class="res-inc" id="inc-materials">+2/с</div>
        </div>
        <div class="resource-card purple" id="card-comfort">
            <div class="res-label">Комфорт</div>
            <div class="res-val" id="val-comfort">10%</div>
            <div class="res-inc" id="inc-comfort">+0.5%/с</div>
        </div>
    </header>

    <div class="game-space">
        <canvas id="cityCanvas"></canvas>
    </div>

    <div class="control-panel">
        <div class="panel-title">Строительство объектов</div>
        <div class="build-grid">
            <button class="btn-build" data-type="reactor" id="btn-reactor">
                <span class="name">Квантовый Реактор</span>
                <span class="cost">Цена: 50 Мат.</span>
                <span class="count" id="cnt-reactor">0</span>
            </button>
            <button class="btn-build" data-type="farm" id="btn-farm">
                <span class="name">Био-Ферма</span>
                <span class="cost">Цена: 40 Эн.</span>
                <span class="count" id="cnt-farm">0</span>
            </button>
            <button class="btn-build" data-type="hub" id="btn-hub">
                <span class="name">Жилой Хаб</span>
                <span class="cost">Цена: 80 Эн. / 60 Мат.</span>
                <span class="count" id="cnt-hub">0</span>
            </button>
        </div>
    </div>

    <script>
        // Состояние игры (Баланс и прирост)
        const state = {
            energy: 100,
            materials: 50,
            comfort: 10,
            
            income: {
                energy: 2,
                materials: 1,
                comfort: 0.1
            },
            
            buildings: {
                reactor: { count: 0, costMat: 50, costEn: 0 },
                farm: { count: 0, costMat: 0, costEn: 40 },
                hub: { count: 0, costMat: 60, costEn: 80 }
            }
        };

        // Настройка Canvas для красивой анимации частиц
        const canvas = document.getElementById('cityCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Класс для светящихся неоновых линий/частиц
        class NeonParticle {
            constructor(color) {
                this.reset(color);
            }
            reset(color) {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height + 20;
                this.speed = Math.random() * 1.5 + 0.5;
                this.radius = Math.random() * 2 + 1;
                this.color = color || (Math.random() > 0.5 ? '#00f0ff' : '#39ff14');
                this.opacity = Math.random() * 0.5 + 0.5;
            }
            update() {
                this.y -= this.speed;
                if (this.y < -10) {
                    this.reset();
                }
            }
            draw() {
                ctx.save();
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.opacity;
                ctx.fill();
                ctx.restore();
            }
        }

        // Создаем пул частиц
        for (let i = 0; i < 40; i++) {
            particles.push(new NeonParticle());
        }

        // Основной цикл анимации Canvas
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Рисуем футуристичную сетку на фоне
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.02)';
            ctx.lineWidth = 1;
            const gridSize = 40;
            for (let x = 0; x < canvas.width; x += gridSize) {
                ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
            }
            for (let y = 0; y < canvas.height; y += gridSize) {
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
            }

            // Рисуем и обновляем частицы (потоки данных)
            particles.forEach(p => {
                p.update();
                p.draw();
            });

            requestAnimationFrame(animate);
        }
        animate();

        // Логика обновления интерфейса
        function updateUI() {
            document.getElementById('val-energy').innerText = Math.floor(state.energy);
            document.getElementById('val-materials').innerText = Math.floor(state.materials);
            document.getElementById('val-comfort').innerText = state.comfort.toFixed(1) + '%';

            document.getElementById('inc-energy').innerText = `+${state.income.energy}/с`;
            document.getElementById('inc-materials').innerText = `+${state.income.materials}/с`;
            document.getElementById('inc-comfort').innerText = `+${state.income.comfort.toFixed(1)}%/с`;

            // Проверка доступности кнопок по ресурсам
            checkButtonAvailability('btn-reactor', state.materials >= state.buildings.reactor.costMat);
            checkButtonAvailability('btn-farm', state.energy >= state.buildings.farm.costEn);
            checkButtonAvailability('btn-hub', state.energy >= state.buildings.hub.costEn && state.materials >= state.buildings.hub.costMat);
        }

        function checkButtonAvailability(id, isAvailable) {
            const btn = document.getElementById(id);
            if (isAvailable) {
                btn.classList.add('available');
                btn.style.opacity = "1";
            } else {
                btn.classList.remove('available');
                btn.style.opacity = "0.4";
            }
        }

        // Игровой таймер (вызывается каждую секунду)
        setInterval(() => {
            state.energy += state.income.energy;
            state.materials += state.income.materials;
            
            // Рост комфорта зависит от энергии и материалов
            if(state.energy > 5 && state.materials > 5) {
                state.comfort += state.income.comfort;
            }
            
            if (state.comfort > 100) state.comfort = 100;

            updateUI();
        }, 1000);

        // Обработка кликов (Покупка зданий)
        document.querySelectorAll('.btn-build').forEach(button => {
            button.addEventListener('click', (e) => {
                const type = button.getAttribute('data-type');
                const bld = state.buildings[type];

                // Проверка условий покупки
                if (state.energy >= bld.costEn && state.materials >= bld.costMat) {
                    state.energy -= bld.costEn;
                    state.materials -= bld.costMat;
                    bld.count++;

                    // Эффекты от построек
                    if (type === 'reactor') {
                        state.income.energy += 3;
                        triggerVisualBoom('#00f0ff');
                    } else if (type === 'farm') {
                        state.income.materials += 2;
                        triggerVisualBoom('#39ff14');
                    } else if (type === 'hub') {
                        state.income.comfort += 0.3;
                        state.income.energy -= 1; // Потребляет энергию
                        triggerVisualBoom('#bd00ff');
                    }

                    // Визуальный отклик на кнопке
                    document.getElementById(`cnt-${type}`).innerText = bld.count;
                    button.classList.add('pulse-active');
                    setTimeout(() => button.classList.remove('pulse-active'), 300);

                    updateUI();
                }
            });
        });

        // Всплеск частиц определенного цвета при покупке
        function triggerVisualBoom(color) {
            for (let i = 0; i < 15; i++) {
                let p = new NeonParticle(color);
                p.y = canvas.height / 2 + (Math.random() * 60 - 30);
                p.x = canvas.width / 2 + (Math.random() * 60 - 30);
                p.speed = Math.random() * 3 + 1;
                particles.push(p);
                // Удаляем лишние частицы, чтобы игра не тормозила
                if(particles.length > 100) particles.shift();
            }
        }

        // Первичная прорисовка
        updateUI();
    </script>
</body>
</html>
