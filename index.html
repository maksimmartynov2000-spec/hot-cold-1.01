<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Мачи Коро — Добыча (Инженерия и Скважины)</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root{
    --wood:#7a4a2b; --wood-dark:#5c3620;
    --paper:#efe2c8; --paper-dark:#e0cfa6; --ink:#2b1d10;
    --grain:#a8790f; --grain-bg:#f3e7c4;
    --meat:#a6432f; --meat-bg:#f7ddd6;
    --fish:#1f7a72; --fish-bg:#d9f0ec;
    --gear:#3b6475; --gear-bg:#e2ebf0;
    --infra:#3a6ea5; --infra-bg:#dbe9f7;
    --research:#7a4a9e; --research-bg:#ece0f5;
    --political:#8a2b2b; --political-bg:#f2d9d9;
    --gold:#c99a2e; --shadow:0 4px 10px rgba(0,0,0,.25);
  }
  *{box-sizing:border-box}
  body{ margin:0; font-family:'Georgia','Times New Roman',serif;
    background: radial-gradient(ellipse at top, #9a6a3f 0%, var(--wood) 55%, var(--wood-dark) 100%);
    color:var(--ink); min-height:100vh; }
  h1,h2,h3{ font-family:'Trebuchet MS','Segoe UI',sans-serif; letter-spacing:.5px; margin:0 }
  .app{ max-width:1300px; margin:0 auto; padding:18px; }
  .title{ text-align:center; color:#fff3df; margin-bottom:14px; text-shadow:0 2px 4px rgba(0,0,0,.5); }
  .title h1{ font-size:2.1em; }
  .title .sub{ font-size:.85em; opacity:.8; font-style:italic; }

  .setup-card{ background:var(--paper); border-radius:16px; padding:26px; max-width:520px; margin:40px auto; box-shadow:var(--shadow); border:6px solid var(--wood-dark); }
  .setup-card label{ display:block; margin:14px 0 6px; font-weight:bold }
  .player-input-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
  .setup-card input[type=text]{ flex: 2; padding:8px 10px; border-radius:8px; border:2px solid var(--wood); font-size:1em; background:#fffaf0; }
  .type-btn { flex: 1; padding: 8px; border-radius: 8px; border: 2px solid var(--wood); background: #fffaf0; cursor: pointer; font-weight: bold; font-size: 0.9em; }
  .type-btn.active { background: var(--infra); color: #fff; border-color: var(--infra); }
  .type-btn.active.ai-type { background: var(--research); border-color: var(--research); }
  
  .player-count-row{ display:flex; gap:8px; margin-top:6px; flex-wrap:wrap }
  .pc-btn{ flex:1; min-width:44px; padding:10px; border-radius:10px; border:2px solid var(--wood); background:#fffaf0; cursor:pointer; font-weight:bold; font-size:1em; }
  .pc-btn.active{ background:var(--gold); color:#fff; border-color:var(--gold) }
  .big-btn{ margin-top:22px; width:100%; padding:14px; font-size:1.15em; border:none; border-radius:12px; background:linear-gradient(180deg,#e2b13c,#c99a2e); color:#3a2405; font-weight:bold; cursor:pointer; box-shadow:0 3px 0 #8a6b1c; }
  .big-btn:active{ transform:translateY(2px); box-shadow:none }

  .board{ display:grid; grid-template-columns:1.8fr 1.2fr; gap:18px; }
  @media (max-width:1024px){ .board{ grid-template-columns:1fr } }
  .panel{ background:var(--paper); border-radius:14px; padding:16px; box-shadow:var(--shadow); border:4px solid var(--wood-dark); margin-bottom:16px }

  .players-strip{ display:flex; gap:10px; flex-wrap:wrap; margin-bottom:14px }
  .player-chip{ flex:1; min-width:150px; background:var(--paper-dark); border-radius:10px; padding:10px; border:2px solid var(--wood); position:relative; }
  .player-chip.current{ border-color:var(--gold); box-shadow:0 0 0 3px rgba(201,154,46,.4) inset }
  .player-chip .pname{ font-weight:bold; font-size:1em }
  .player-chip .pname .badge { font-size: 0.75em; padding: 2px 5px; border-radius: 4px; background: rgba(0,0,0,0.1); margin-left: 4px; font-weight: normal; }
  .player-chip .coins{ color:#7a4a00; font-weight:bold; margin-top:2px }
  .player-chip .lm-row{ display:flex; gap:4px; margin-top:6px; font-size:1.1em; flex-wrap:wrap }
  .lm-icon{ opacity:.25 } .lm-icon.built{ opacity:1 }
  .turn-badge{ position:absolute; top:-9px; right:-9px; background:var(--gold); color:#3a2405; border-radius:50%; width:22px;height:22px; display:flex; align-items:center; justify-content:center; font-size:.75em; font-weight:bold; box-shadow:var(--shadow) }

  .dice-area{ display:flex; align-items:center; gap:14px; flex-wrap:wrap; margin-bottom:10px }
  .dice animate{ display:flex; gap:8px }
  .die-wrap{ display:flex; flex-direction:column; align-items:center; gap:4px }
  .die{ width:52px; height:52px; background:#fffaf0; border-radius:10px; border:3px solid var(--wood); display:flex; align-items:center; justify-content:center; font-size:1.6em; font-weight:bold; box-shadow:var(--shadow) }
  .die-reroll{ font-size:.65em; padding:2px 5px; border-radius:6px; border:1px solid var(--wood); background:#fff; cursor:pointer }
  .action-btn{ padding:10px 16px; border-radius:10px; border:2px solid var(--wood); background:#fffaf0; cursor:pointer; font-weight:bold; }
  .action-btn.primary{ background:var(--gold); border-color:#8a6b1c; color:#3a2405 }
  .action-btn:disabled{ opacity:.4; cursor:not-allowed }

  .log{ background:#fffaf0; border-radius:8px; padding:8px 10px; max-height:140px; overflow-y:auto; font-size:.85em; border:1px solid var(--wood); margin-top:10px; }
  .log div{ padding:2px 0; border-bottom:1px dashed #d8c7a0 }

  .section-title{ margin:0 0 10px 0; font-size:1.1em; color:var(--wood-dark); border-bottom:2px solid var(--wood); padding-bottom:4px }
  .subsection-title{ font-size:.75em; font-weight:bold; color:#fff; padding:2px 6px; border-radius:4px; display:inline-block; margin-bottom:4px }
  .subsection-title.infra{ background:var(--infra) }
  .subsection-title.research{ background:var(--research) }
  .subsection-title.political{ background:var(--political) }

  .cards-grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(135px,1fr)); gap:10px }
  .card{ border-radius:12px; padding:10px; border:2px solid #0002; position:relative; min-height:140px; display:flex; flex-direction:column; justify-content:space-between; box-shadow:0 2px 4px rgba(0,0,0,.15); }
  .card.grain{ background:var(--grain-bg); border-color:var(--grain) }
  .card.meat{ background:var(--meat-bg); border-color:var(--meat) }
  .card.fish{ background:var(--fish-bg); border-color:var(--fish) }
  .card.gear{ background:var(--gear-bg); border-color:var(--gear) }
  .card .icon{ font-size:1.5em }
  .card .name{ font-weight:bold; font-size:.82em; margin:2px 0 }
  .card .activation{ font-size:.75em; font-weight:bold; }
  .card .req{ font-size:.65em; font-weight:bold; color:var(--research); margin-bottom:2px; }
  .card .desc{ font-size:.65em; opacity:.85; flex-grow:1; min-height:35px; line-height:1.2 }
  .card .footer{ display:flex; justify-content:space-between; align-items:center; margin-top:6px }
  .card .cost{ font-weight:bold; color:var(--wood-dark); font-size:0.9em }
  .card .supply{ font-size:.7em; opacity:.7 }
  .card .buy-btn{ font-size:.75em; padding:4px 8px; border-radius:6px; border:1px solid var(--wood); background:#fff; cursor:pointer; font-weight:bold }
  .card .buy-btn:disabled{ opacity:.35; cursor:not-allowed }
  .card .owned-badge{ position:absolute; top:-8px; right:-8px; background:var(--wood-dark); color:#fff; border-radius:50%; min-width:22px; height:22px; padding:0 5px; display:flex; align-items:center; justify-content:center; font-size:.72em; font-weight:bold }

  .landmarks-container { display:flex; flex-direction:column; gap:12px; }
  .landmarks-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:8px; }
  .landmark{ background:#fffaf0; border:2px solid var(--wood); border-radius:12px; padding:8px; position: relative; display:flex; flex-direction:column; justify-content:space-between; min-height:105px; }
  .landmark.built{ background:#f0e6c8; border-color:var(--gold) }
  .landmark .name{ font-weight:bold; font-size:0.85em; }
  .landmark .desc{ font-size:.72em; margin:4px 0; opacity:0.9; }
  .landmark .footer{ display:flex; justify-content:space-between; align-items:center; margin-top:4px; }

  .my-establishments{ display:flex; flex-wrap:wrap; gap:4px; margin-top:6px }
  .mini-card{ background:#fff; border-radius:6px; padding:2px 5px; font-size:.7em; border:1px solid var(--wood); display:flex; gap:2px; align-items:center }

  .overlay{ position:fixed; inset:0; background:rgba(20,10,0,.55); display:flex; align-items:center; justify-content:center; z-index:20 }
  .overlay-card{ background:var(--paper); border-radius:14px; padding:22px; max-width:420px; border:5px solid var(--wood-dark); box-shadow:var(--shadow) }
  .overlay-card h3{ margin-bottom:10px }
  .overlay-card .choice-btn{ display:block; width:100%; text-align:left; margin:6px 0; padding:10px; border-radius:8px; border:2px solid var(--wood); background:#fffaf0; cursor:pointer; font-weight:bold }

  .banner{ background:var(--research-bg); border:2px solid var(--research); border-radius:10px; padding:8px 12px; font-size:.85em; margin-bottom:10px }
  .winner-banner{ text-align:center; padding:30px; }
  .winner-banner h2{ font-size:1.8em; color:var(--gold) }
  footer.note{ text-align:center; color:#f0e0c0; font-size:.75em; opacity:.7; margin-top:20px }
</style>
</head>
<body>
<div class="app" id="app"></div>

<script>
/* ======================= БАЗА ДАННЫХ ИГРЫ ======================= */
// Основной набор (базовые)
const OLD_BASE = [
  { id:'hwheat',   name:'Пшеничное поле',  type:'grain', cost:1, activation:[1],   icon:'🌾', income:1, desc:'Бросок 1 у любого: +1 монета из банка' },
  { id:'hpotato',  name:'Картофельное поле',type:'grain', cost:2, activation:[4],   icon:'🥔', income:1, desc:'Бросок 4: +1 монета за каждое ваше Картофельное поле' },
  { id:'hcorn',   name:'Кукурузное поле',  type:'grain', cost:3, activation:[5],   icon:'🌽', income:2, desc:'Бросок 5: +2 монеты из банка' },
  { id:'hpoultry',  name:'Птицефабрика',   type:'meat',  cost:1, activation:[2],   icon:'🐔', special:'poultry', desc:'Бросок 2: +1 монета за каждый курятник в городе' },
  { id:'hpig',   name:'Свиноферма',        type:'meat',  cost:2, activation:[3,4], icon:'🐖', income:2, desc:'Бросок 3-4: +2 монеты из банка' },
  { id:'hmeat',  name:'Мясная ферма',      type:'meat',  cost:5, activation:[4,5,6],icon:'🥩', special:'meatfarm', desc:'Бросок 4-6: +2 монеты. Блокируется Птицефабрикой/Свинофермой' },
  { id:'hfishboat',  name:'Рыбацкая лодка',  type:'fish',  cost:2, activation:[1,5], icon:'🚣', income:2, requiresPort:true, desc:'Бросок 1 или 5: +2 монеты (нужен Порт)' },
  { id:'hfishnet',  name:'Рыбацкие сети',   type:'fish',  cost:3, activation:[2,4,6],icon:'🕸️', income:1, requiresPort:true, desc:'Бросок 2, 4 или 6: +1 монета (нужен Порт)' },
  { id:'hfishagency',name:'Рыболовное агентство',type:'fish',cost:8, activation:[1,3,5,7,9,11,13,15,17], icon:'🏭', income:1, requiresPort:true, desc:'Нечётный бросок: +1 монета (нужен Порт)' },
];

// Основной набор (улучшения)
const OLD_UPGRADES = [
  { id:'hwheatU',  name:'Улучш. пшеничное поле', type:'grain', cost:3, activation:[1,2], icon:'🌾', income:2, upgradeOf:'hwheat', desc:'Бросок 1-2 у любого: +2 монеты' },
  { id:'hpotatoU', name:'Улучш. картофельное поле',type:'grain',cost:6, activation:[4],   icon:'🥔', income:2, upgradeOf:'hpotato', desc:'Бросок 4: +2 монеты за каждое ваше Картофельное поле' },
  { id:'hcornU',  name:'Улучш. кукурузное поле', type:'grain', cost:9, activation:[5,6], icon:'🌽', income:2, upgradeOf:'hcorn', desc:'Бросок 5-6: +2 монеты из банка' },
  { id:'hpoultryU', name:'Улучш. птицефабрика',  type:'meat',  cost:3, activation:[2],   icon:'🐔', special:'poultry', upgradeOf:'hpoultry', desc:'Бросок 2: +2 монеты за каждый курятник в городе' },
  { id:'hpigU',  name:'Улучш. свиноферма',       type:'meat',  cost:6, activation:[3,4], icon:'🐖', income:3, upgradeOf:'hpig', desc:'Бросок 3-4: +3 монеты из банка' },
  { id:'hmeatU', name:'Улучш. мясная ферма',      type:'meat',  cost:15,activation:[4,5,6],icon:'🥩', special:'meatfarm', upgradeOf:'hmeat', desc:'Бросок 4-6: +3 монеты. Блокируется' },
  { id:'hfishboatU', name:'Улучш. рыбацкая лодка',type:'fish', cost:6, activation:[1,3,5], icon:'🚣', income:2, requiresPort:true, upgradeOf:'hfishboat', desc:'Бросок 1, 3 или 5: +2 монеты (нужен Порт)' },
  { id:'hfishnetU', name:'Улучш. рыбацкие сети', type:'fish',  cost:9, activation:[1,2,3,4,5,6], icon:'🕸️', income:1, requiresPort:true, upgradeOf:'hfishnet', desc:'Любой бросок: +1 монета (нужен Порт)' },
  { id:'hfishagencyU',name:'Улучш. рыболовное агентство',type:'fish',cost:24,activation:[1,3,5,7,9,11,13,15,17], icon:'🏭', income:2, requiresPort:true, upgradeOf:'hfishagency', desc:'Нечётный бросок: +2 монеты (нужен Порт)' },
];

// Новый набор (базовые)
const NEW_BASE = [
  { id:'ncoal',  name:'Угольная шахта',    type:'gear', cost:5, activation:[7], icon:'⛏️', income:3, desc:'Бросок 7 у любого: +3 монеты из банка' },
  { id:'nwood',  name:'Лесопилка',         type:'gear', cost:7, activation:[8,9], icon:'🪓', income:4, desc:'Бросок 8-9 у любого: +4 монеты из банка' },
  { id:'nsea',   name:'Морская скважина',  type:'gear', cost:10, activation:[2,4,6,8,10,12,14,16,18], icon:'🌊', income:2, requiresPortUp:true, desc:'Чётный бросок у любого: +2 монеты (нужен расширенный Порт)' },
  { id:'ngas',   name:'Газовая скважина',  type:'gear', cost:5, activation:[10,11,12], icon:'🔥', special:'gas', desc:'Бросок 10-12: +10 монет. Но по -3 💰 за каждую иную газовую скважину в игре' },
];

// Новый набор (улучшения)
const NEW_UPGRADES = [
  { id:'ncoalU', name:'Улучш. угольная шахта', type:'gear', cost:15, activation:[7,8], icon:'⛏️', income:3, upgradeOf:'ncoal', desc:'Бросок 7-8 у любого: +3 монеты' },
  { id:'nwoodU', name:'Улучш. лесопилка',      type:'gear', cost:21, activation:[8,9,10], icon:'🪓', income:4, upgradeOf:'nwood', desc:'Бросок 8-10 у любого: +4 монеты' },
  { id:'nseaU',  name:'Улучш. скважина',       type:'gear', cost:30, activation:[2,4,6,8,10,12,14,16,18], icon:'🌊', income:4, requiresPortUp:true, upgradeOf:'nsea', desc:'Чётный бросок: +4 монеты (нужен расширенный Порт)' },
  { id:'ngasU',  name:'Улучш. газовая скважина',type:'gear', cost:15, activation:[10,11,12], icon:'🔥', special:'gasU', upgradeOf:'ngas', desc:'Бросок 10-12: +10 монет. Но по -1 💰 за каждую иную газовую скважину в игре' },
];

// Полный реестр карт для быстрого поиска параметров
const ALL_ESTABLISHMENTS = [...OLD_BASE, ...OLD_UPGRADES, ...NEW_BASE, ...NEW_UPGRADES];

// СТРОЙКА (Цены удвоены, доступны всегда)
const CONSTRUCTION_LANDMARKS = [
  { id:'port',       category:'infra', cost:8,  icon:'⚓', name:'Порт', desc:'Позволяет бросать 2 кубика вместо одного' },
  { id:'portUp',     category:'infra', cost:16,  icon:'⚓', name:'Порт: расширение', upgradeOf:'port', desc:'Дубль на 2 кубиках дарит доп. ход. Нужен для Морских скважин' },
  { id:'station',    category:'infra', cost:16,  icon:'🚉', name:'Вокзал', desc:'Позволяет бросать 3 кубика вместо одного' },
  { id:'stationUp',  category:'infra', cost:28, icon:'🚉', name:'Вокзал: расширение', upgradeOf:'station', desc:'Дубль на 3 кубиках активирует инженерию без дубля' },
  { id:'airport',    category:'infra', cost:12,  icon:'✈️', name:'Аэропорт', desc:'Раз за ход можно перебросить все кубики' },
  { id:'airportUp',  category:'infra', cost:20, icon:'✈️', name:'Аэропорт: расширение', upgradeOf:'airport', desc:'Переброс становится точечным — только 1 кубик' },

  { id:'modernization',   category:'research', cost:20, icon:'⚙️', name:'Модернизация', desc:'Открывает покупку улучшенных предприятий' },
  { id:'animalhusbandry', category:'research', cost:28, icon:'📈', name:'Животноводство', desc:'Предприятия с колоском, мясом и рыбой срабатывают дважды' },
  { id:'engineering',     category:'research', cost:20, icon:'🔧', name:'Инженерия', desc:'Предприятия с шестерёнкой срабатывают ещё раз при дубле' },
  { id:'michelin',        category:'research', cost:20, icon:'⭐', name:'Мишлен', desc:'Предприятия с кружечкой запускают связанное предприятие' },
  { id:'innovations',     category:'research', cost:24, icon:'💡', name:'Инновации', desc:'Открывает покупку расширений для построек' },

  { id:'senate',    category:'political', cost:24, icon:'🏛️', name:'Сенат', desc:'Открывает нижнюю и верхнюю палату на 3 кубиках' },
  { id:'spycenter', category:'political', cost:32, icon:'🕵️', name:'Шпионский центр', desc:'Нижний стрит (1,2 или 1,2,3) — контроль чужого броска' },
  { id:'opposition',category:'political', cost:36, icon:'✊', name:'Оппозиция', desc:'Верхний стрит — сносит улучшение соперника' },
  { id:'coup',      category:'political', cost:40, icon:'⚡', name:'Переворот', desc:'Бросок 1, 2 или 3 — все соперники пропускают следующий ход' },
];

/* ======================= СОСТОЯНИЕ ИГРЫ ======================= */
let state = null;
let aiTimeout = null;

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

function newGame(numPlayers, names, types){
  const supply = {};
  ALL_ESTABLISHMENTS.forEach(c => { supply[c.id] = c.id.startsWith('n') ? 6 : (c.id.endsWith('U') ? 2 : 6); });

  // Формируем пулы уникальных карт для раскладки рынка
  const oldBasePool = [...OLD_BASE]; shuffle(oldBasePool);
  const selectedOldBase = oldBasePool.slice(0, 4); // 4 уникальных старых
  
  const selectedOldUpgrades = []; // Находим к ним парные улучшения
  selectedOldBase.forEach(b => {
    const up = OLD_UPGRADES.find(u => u.upgradeOf === b.id);
    if(up) selectedOldUpgrades.push(up);
  });
  shuffle(selectedOldUpgrades);
  const selectedOldUpgradesFinal = selectedOldUpgrades.slice(0, 2); // 2 уникальных улучшения старых

  const newBasePool = [...NEW_BASE]; shuffle(newBasePool); // Все 4 новые карты уникальны
  const newUpgradePool = [...NEW_UPGRADES]; shuffle(newUpgradePool);
  const selectedNewUpgradesFinal = newUpgradePool.slice(0, 2); // 2 уникальных новых улучшения

  // Заполняем видимый рынок
  const marketBase = [...selectedOldBase.map(c=>c.id), ...newBasePool.map(c=>c.id)];
  const marketUpgrade = [...selectedOldUpgradesFinal.map(c=>c.id), ...selectedNewUpgradesFinal.map(c=>c.id)];

  const players = [];
  for(let i=0; i<numPlayers; i++){
    const lm = {}; CONSTRUCTION_LANDMARKS.forEach(l => { lm[l.id] = false; });
    players.push({
      name: names[i], coins: 5, cards: {}, landmarks: lm, skipNext: false, isAI: types[i] === 'ai'
    });
  }

  return {
    players, supply, marketBase, marketUpgrade,
    current: 0, log: [], phase: 'roll',
    lastRoll: null, usedReroll: false, bonusReroll: false, pending: null, pendingSpy: null,
    winner: null, extraTurn: false, purchasesRemaining: 1, isDouble: false
  };
}

function log(msg){ state.log.unshift(msg); if(state.log.length>30) state.log.pop(); }
function curPlayer(){ return state.players[state.current]; }
function count(player, id){ return player.cards[id]||0; }

/* ======================= ИГРОВАЯ ЛОГИКА ======================= */
function rollDice(numDice){
  state.log = [];
  if(state.pendingSpy && state.pendingSpy.targetIdx === state.current){
    log(`🕵️ Контроль броска: ${state.players[state.pendingSpy.ownerIdx].name} управляет костями ${curPlayer().name}`);
    state.pendingSpy = null;
  }
  const dice = [];
  for(let i=0; i<numDice; i++) dice.push(1+Math.floor(Math.random()*6));
  state.lastRoll = dice;
  state.usedReroll = false;
  state.isDouble = (numDice >= 2 && dice.every(val => val === dice[0]));
  resolveRoll(dice, false);
  render();
}

function rerollAll(){
  const p = curPlayer();
  if(!p.landmarks.airport || state.usedReroll) return;
  state.usedReroll = true;
  const dice = state.lastRoll.map(() => 1+Math.floor(Math.random()*6));
  state.lastRoll = dice;
  state.isDouble = (dice.length >= 2 && dice.every(val => val === dice[0]));
  log('🔁 Переброшены все кубики: ' + dice.join(' + '));
  resolveRoll(dice, true);
  render();
}

function rerollOne(idx){
  const p = curPlayer();
  if(!p.landmarks.airport || !p.landmarks.airportUp || state.usedReroll) return;
  state.usedReroll = true;
  const dice = [...state.lastRoll];
  dice[idx] = 1+Math.floor(Math.random()*6);
  state.lastRoll = dice;
  state.isDouble = (dice.length >= 2 && dice.every(val => val === dice[0]));
  log(`🔁 Переброшен кубик №${idx+1}: новое значение ${dice[idx]}`);
  resolveRoll(dice, true);
  render();
}

function checkStraight(dice, targetArr) {
  if (dice.length !== targetArr.length) return false;
  return [...dice].sort().every((val, i) => val === [...targetArr].sort()[i]);
}

function resolveRoll(dice, isReroll){
  const total = dice.reduce((a,b)=>a+b,0);
  if(!isReroll) log('🎲 ' + curPlayer().name + ' выбросил(а): ' + dice.join(' + ') + ' = ' + total);
  else log('   Новый результат броска: ' + total);

  const active = curPlayer();

  state.players.forEach(p => {
    ALL_ESTABLISHMENTS.forEach(card => {
      if(!card.activation.includes(total)) return;
      if(card.requiresPort && !p.landmarks.port) return;
      if(card.requiresPortUp && !p.landmarks.portUp) return; // Условие для морских скважин
      
      const c = count(p, card.id);
      if(c <= 0) return;
      
      let amount = 0;
      let labelDetails = '';

      if(card.special === 'poultry'){
        const rate = card.id === 'hpoultry' ? 1 : 2;
        const globalPoultry = state.players.reduce((s,pl) => s + count(pl,'hpoultry') + count(pl,'hpoultryU'), 0);
        amount = rate * globalPoultry * c;
      } else if(card.special === 'meatfarm'){
        const blocked = count(p,'hpoultry')>0 || count(p,'hpoultryU')>0 || count(p,'hpig')>0 || count(p,'hpigU')>0;
        amount = blocked ? 0 : (card.id === 'hmeat' ? 2 : 3) * c;
      } else if(card.special === 'gas' || card.special === 'gasU'){
        // Подсчёт иных скважин у всех игроков
        const globalGas = state.players.reduce((s,pl) => s + count(pl,'ngas') + count(pl,'ngasU'), 0);
        const penaltyRate = card.special === 'gas' ? 3 : 1;
        // Штраф считается за *каждую другую* газовую скважину в игре
        const otherGasCount = Math.max(0, globalGas - 1); 
        const baseIncome = 10;
        const netEach = Math.max(0, baseIncome - (otherGasCount * penaltyRate));
        amount = netEach * c;
        labelDetails = ` (база 10, штраф за другие скважины: -${otherGasCount * penaltyRate} 💰)`;
      } else {
        amount = (card.income || 0) * c;
      }

      if(p.landmarks.animalhusbandry && ['grain','meat','fish'].includes(card.type)) amount *= 2;
      
      // Синергия Инженерии при дубле
      if(p.landmarks.engineering && card.type === 'gear'){
        if(state.isDouble || p.landmarks.stationUp) {
          amount *= 2;
          labelDetails += ' [Эффект Инженерии 🔧]';
        }
      }

      if(amount > 0){ 
        p.coins += amount; 
        log(`  ${card.icon} ${card.name} (${p.name}): +${amount} 💰${labelDetails}`); 
      }
    });
  });

  if(active.coins === 0) { active.coins = 1; log(`🎁 Страховка: банк выделил +1 монету ${active.name}!`); }

  const lower2 = checkStraight(dice, [1, 2]);
  const lower3 = active.landmarks.senate && checkStraight(dice, [1, 2, 3]);
  const upper2 = checkStraight(dice, [5, 6]);
  const upper3 = active.landmarks.senate && checkStraight(dice, [4, 5, 6]);

  if(active.landmarks.coup && [1,2,3].includes(total)){
    state.players.forEach((p,i) => { if(i !== state.current) p.skipNext = true; });
    log('⚡ Государственный переворот! Оппоненты пропускают ход.');
  }
  if(active.landmarks.spycenter && (lower2 || lower3) && state.players.length > 1){
    state.pending = { type: 'spy_choose_target' };
  }
  if(active.landmarks.opposition && (upper2 || upper3) && state.players.length > 1){
    state.pending = { type: 'opp_choose_target', destroySenate: upper3 };
  }

  if(state.isDouble && active.landmarks.portUp){
    state.extraTurn = true; log('✨ Дубль! Получен дополнительный ход благодаря Порту.');
  }

  state.phase = state.pending ? 'pending' : 'postroll';
}

function resolveSpyTarget(targetIdx){
  state.pendingSpy = { ownerIdx: state.current, targetIdx };
  log(`🕵️ ${curPlayer().name} перехватил контроль над кубиками игрока ${state.players[targetIdx].name}`);
  state.pending = null; state.phase = 'postroll'; render();
}

function oppChooseTarget(targetIdx){
  state.pending = { type: 'opp_choose_building', targetIdx, destroySenate: state.pending.destroySenate };
  render();
}

function oppDestroyBuilding(cardId){
  const target = state.players[state.pending.targetIdx];
  target.cards[cardId] = Math.max(0, (target.cards[cardId]||0)-1);
  const c = ALL_ESTABLISHMENTS.find(x => x.id === cardId);
  log(`✊ Оппозиция уничтожила улучшение «${c.name}» у игрока ${target.name}`);
  finishOpposition();
}

function finishOpposition(){
  const target = state.players[state.pending.targetIdx];
  if(state.pending.destroySenate && target.landmarks.senate){
    target.landmarks.senate = false; log(`✊ Оппозиция разрушила Сенат игрока ${target.name}!`);
  }
  state.pending = null; state.phase = 'postroll'; render();
}

function buyCard(id, isUpgrade){
  if(state.purchasesRemaining <= 0) return false;
  const p = curPlayer();
  const card = ALL_ESTABLISHMENTS.find(c => c.id === id);
  if(!card || p.coins < card.cost) return false;

  if(isUpgrade){
    if(!p.landmarks.modernization || count(p, card.upgradeOf) < 1) return false;
    p.coins -= card.cost;
    p.cards[card.upgradeOf] -= 1;
    p.cards[id] = (p.cards[id]||0) + 1;
    log(`⚙️ ${p.name} провёл модернизацию до: ${card.icon} ${card.name}`);
  } else {
    p.coins -= card.cost;
    p.cards[id] = (p.cards[id]||0) + 1;
    log(`🛒 ${p.name} приобрёл предприятие: ${card.icon} ${card.name}`);
  }

  state.purchasesRemaining = 0;
  render();
  return true;
}

function buildLandmark(id){
  if(state.purchasesRemaining <= 0) return false;
  const p = curPlayer();
  const lm = CONSTRUCTION_LANDMARKS.find(l => l.id === id);
  if(!lm || p.landmarks[id] || p.coins < lm.cost) return false;
  if(lm.upgradeOf && (!p.landmarks.innovations || !p.landmarks[lm.upgradeOf])) return false;

  p.coins -= lm.cost;
  p.landmarks[id] = true;
  log(`🏗️ ${p.name} возвёл объект: ${lm.icon} ${lm.name}`);
  state.purchasesRemaining = 0;

  if(CONSTRUCTION_LANDMARKS.every(l => p.landmarks[l.id])) state.winner = p;
  render();
  return true;
}

function endTurn(){
  if(state.winner){ render(); return; }
  if(state.extraTurn){ state.extraTurn = false; } 
  else {
    let next = (state.current+1)%state.players.length;
    let guard = 0;
    while(state.players[next].skipNext && guard < state.players.length){
      log(`⏭️ ${state.players[next].name} пропускает этот круг`);
      state.players[next].skipNext = false;
      next = (next+1)%state.players.length; guard++;
    }
    state.current = next;
  }
  state.lastRoll = null; state.usedReroll = false;
  state.purchasesRemaining = 1; state.phase = 'roll';
  render();
}

/* ======================= ЛОГИКА ИИ ======================= */
function runAILogic(){
  if(!state || state.winner) return;
  const p = curPlayer(); if(!p.isAI) return;
  if(aiTimeout) clearTimeout(aiTimeout);
  
  aiTimeout = setTimeout(() => {
    if(state.phase === 'roll'){
      let d = 1; if(p.landmarks.station) d = 3; else if(p.landmarks.port) d = 2;
      rollDice(d); return;
    }
    if(state.phase === 'pending'){
      let targetIdx = (state.current + 1) % state.players.length;
      if(state.pending.type === 'spy_choose_target' || state.pending.type === 'opp_choose_target'){
        resolveSpyTarget(targetIdx);
      } else {
        const target = state.players[state.pending.targetIdx];
        const ownedUps = OLD_UPGRADES.concat(NEW_UPGRADES).filter(c => count(target, c.id) > 0);
        if(ownedUps.length > 0) oppDestroyBuilding(ownedUps[0].id); else finishOpposition();
      }
      return;
    }
    if(state.phase === 'postroll'){
      if(state.purchasesRemaining > 0){
        let unbuiltLms = CONSTRUCTION_LANDMARKS.filter(l => !p.landmarks[l.id] && p.coins >= l.cost);
        unbuiltLms = unbuiltLms.filter(l => !l.upgradeOf || (p.landmarks.innovations && p.landmarks[l.upgradeOf]));
        if(unbuiltLms.length > 0){
          unbuiltLms.sort((a,b) => a.cost - b.cost);
          if(buildLandmark(unbuiltLms[0].id)) return;
        }
        let affordableUps = OLD_UPGRADES.concat(NEW_UPGRADES).filter(c => state.marketUpgrade.includes(c.id) && p.coins >= c.cost && p.landmarks.modernization && count(p, c.upgradeOf) > 0);
        if(affordableUps.length > 0 && buyCard(affordableUps[0].id, true)) return;

        let affordableBase = OLD_BASE.concat(NEW_BASE).filter(c => state.marketBase.includes(c.id) && p.coins >= c.cost);
        // Проверка для скважин бота
        affordableBase = affordableBase.filter(c => !c.requiresPortUp || p.landmarks.portUp);
        if(affordableBase.length > 0 && buyCard(affordableBase[0].id, false)) return;
      }
      endTurn();
    }
  }, 700);
}

/* ======================= РЕНДЕР ИНТЕРФЕЙСА ======================= */
const app = document.getElementById('app');
function render(){
  if(!state){ renderSetup(); return; }
  if(state.winner){ renderWinner(); return; }

  const p = curPlayer();
  const inRoll = state.phase==='roll';
  const inPost = state.phase==='postroll';
  const isHuman = !p.isAI;
  const canReroll = p.landmarks.airport && !state.usedReroll;

  let html = `<div class="title"><h1>🎲 Мачи Коро: Ресурсная Добыча</h1><div class="sub">Сбалансированный рынок (4 старых + 4 новых базовых предприятия)</div></div>`;
  html += `<div class="board"><div>`;

  // Панель игроков
  html += `<div class="panel"><div class="players-strip">`;
  state.players.forEach((pl,i) => {
    html += `<div class="player-chip ${i===state.current?'current':''}">`;
    if(i===state.current) html += `<div class="turn-badge">▶</div>`;
    html += `<div class="pname">${pl.name}${pl.skipNext?' 😴':''}<span class="badge">${pl.isAI?'ИИ':'Игрок'}</span></div><div class="coins">💰 ${pl.coins}</div>`;
    html += `<div class="lm-row">`;
    CONSTRUCTION_LANDMARKS.forEach(l => { if(pl.landmarks[l.id]) html += `<span class="lm-icon built" title="${l.name}">${l.icon}</span>`; });
    html += `</div>`;
    html += `<div class="my-establishments">`;
    ALL_ESTABLISHMENTS.forEach(c => {
      const cnt = count(pl, c.id); if(cnt > 0) html += `<div class="mini-card">${c.icon} x${cnt}</div>`;
    });
    html += `</div></div>`;
  });
  html += `</div></div>`;

  // Броски и логи
  html += `<div class="panel"><div class="dice-area">`;
  if(state.lastRoll){
    html += `<div class="dice">` + state.lastRoll.map((d,i) => {
      let cell = `<div class="die-wrap"><div class="die">${d}</div>`;
      if(inPost && canReroll && p.landmarks.airportUp && isHuman) cell += `<button class="die-reroll" onclick="rerollOne(${i})">🔁</button>`;
      return cell + `</div>`;
    }).join('') + `</div>`;
    html += `<div style="font-weight:bold">Сумма: ${state.lastRoll.reduce((a,b)=>a+b,0)} ${state.isDouble?'(ДУБЛЬ!):' : ':'}</div>`;
  }
  if(inRoll && isHuman){
    html += `<button class="action-btn primary" onclick="rollDice(1)">1 кубик</button>`;
    if(p.landmarks.port) html += `<button class="action-btn primary" onclick="rollDice(2)">2 кубика</button>`;
    if(p.landmarks.station) html += `<button class="action-btn primary" onclick="rollDice(3)">3 кубика</button>`;
  } else if(inRoll) {
    html += `<div style="font-style:italic">🤖 Компьютер делает расчёты...</div>`;
  }
  if(inPost && canReroll && !p.landmarks.airportUp && isHuman) html += `<button class="action-btn" onclick="rerollAll()">✈️ Переброс всех</button>`;
  if(inPost && isHuman) html += `<button class="action-btn primary" onclick="endTurn()">Передать ход</button>`;
  html += `</div><div class="log">` + state.log.map(l=>`<div>${l}</div>`).join('') + `</div></div>`;

  // 1. БАЗОВЫЕ ПРЕДПРИЯТИЯ (4 старых + 4 новых)
  html += `<div class="panel"><h3 class="section-title">🏙️ Рыночные предприятия (4 из классики + 4 ресурсных)</h3><div class="cards-grid">`;
  state.marketBase.forEach(id => {
    const c = ALL_ESTABLISHMENTS.find(item => item.id === id); if(!c) return;
    const reqPortOk = !c.requiresPort || p.landmarks.port;
    const reqPortUpOk = !c.requiresPortUp || p.landmarks.portUp;
    const disabled = !isHuman || !inPost || state.purchasesRemaining<=0 || p.coins<c.cost || !reqPortOk || !reqPortUpOk;
    
    html += `<div class="card ${c.type}"><div class="icon">${c.icon}</div><div class="name">${c.name}</div>`;
    html += `<div class="activation">🎯 Шаг: ${c.activation.join('/')}</div><div class="desc">${c.desc}</div>`;
    if(c.requiresPortUp && !p.landmarks.portUp) html += `<div style="font-size:0.6em;color:red;font-weight:bold">Нужно расширение порта</div>`;
    html += `<div class="footer"><span class="cost">${c.cost} 💰</span></div>`;
    html += `<button class="buy-btn" ${disabled?'disabled':''} onclick="buyCard('${c.id}', false)">Купить</button></div>`;
  });
  html += `</div></div>`;

  // 2. УЛУЧШЕНИЯ ПРЕДПРИЯТИЙ (2 старых + 2 новых)
  html += `<div class="panel"><h3 class="section-title">⚙️ Рыночные улучшения (2 из классики + 2 ресурсных)</h3><div class="cards-grid">`;
  state.marketUpgrade.forEach(id => {
    const c = ALL_ESTABLISHMENTS.find(item => item.id === id); if(!c) return;
    const hasBase = count(p, c.upgradeOf) >= 1;
    const reqPortUpOk = !c.requiresPortUp || p.landmarks.portUp;
    const disabled = !isHuman || !inPost || state.purchasesRemaining<=0 || !p.landmarks.modernization || !hasBase || p.coins<c.cost || !reqPortUpOk;
    const baseName = ALL_ESTABLISHMENTS.find(x=>x.id===c.upgradeOf).name;
    
    html += `<div class="card ${c.type}"><div class="icon">${c.icon}</div><div class="name">${c.name}</div>`;
    html += `<div class="req">Требует: 1 ${baseName}</div><div class="desc">${c.desc}</div>`;
    if(c.requiresPortUp && !p.landmarks.portUp) html += `<div style="font-size:0.6em;color:red;font-weight:bold">Нужен расш. Порт</div>`;
    html += `<div class="footer"><span class="cost">${c.cost} 💰</span></div>`;
    html += `<button class="buy-btn" ${disabled?'disabled':''} onclick="buyCard('${c.id}', true)">Улучшить</button></div>`;
  });
  html += `</div></div></div>`;

  // ПРАВАЯ КОЛОНКА: Стройка площадок
  html += `<div><div class="panel"><h3 class="section-title">🏗️ Городские постройки (Цены ×2)</h3><div class="landmarks-container">`;
  ['infra', 'research', 'political'].forEach(cat => {
    html += `<div><span class="subsection-title ${cat}">${cat.toUpperCase()}</span><div class="landmarks-grid">`;
    CONSTRUCTION_LANDMARKS.filter(l => l.category === cat).forEach(l => {
      const built = p.landmarks[l.id];
      let reqOk = !l.upgradeOf || (p.landmarks.innovations && p.landmarks[l.upgradeOf]);
      const disabled = !isHuman || !inPost || state.purchasesRemaining<=0 || built || p.coins<l.cost || !reqOk;
      
      html += `<div class="landmark ${built?'built':''}">`;
      html += `<div><div class="name">${l.icon} ${l.name}</div><div class="desc">${l.desc}</div>`;
      if(l.upgradeOf && !p.landmarks[l.upgradeOf]) html += `<div style="font-size:0.65em;color:red;font-weight:bold">Требует базовое здание</div>`;
      html += `</div><div class="footer"><span class="cost">${built?'Построено':l.cost+' 💰'}</span>`;
      if(!built) html += `<button class="buy-btn" ${disabled?'disabled':''} onclick="buildLandmark('${l.id}')">Строить</button>`;
      html += `</div></div>`;
    });
    html += `</div></div>`;
  });
  html += `</div></div></div></div>`;
  
  app.innerHTML = html;
  if(state.phase === 'pending') renderPendingOverlay();
  if(p.isAI) runAILogic();
}

function renderPendingOverlay(){
  if(curPlayer().isAI) return;
  let html = `<div class="overlay"><div class="overlay-card">`;
  if(state.pending.type==='spy_choose_target'){
    html += `<h3>🕵️ Шпионский центр — выберите цель</h3>`;
    state.players.forEach((pl,i)=>{ if(i!==state.current) html += `<button class="choice-btn" onclick="resolveSpyTarget(${i})">${pl.name}</button>`; });
  } else if(state.pending.type==='opp_choose_target'){
    html += `<h3>✊ Оппозиция — выберите цель</h3>`;
    state.players.forEach((pl,i)=>{ if(i!==state.current) html += `<button class="choice-btn" onclick="oppChooseTarget(${i})">${pl.name}</button>`; });
  } else if(state.pending.type==='opp_choose_building'){
    const target = state.players[state.pending.targetIdx];
    const ownedUps = OLD_UPGRADES.concat(NEW_UPGRADES).filter(c => count(target, c.id) > 0);
    html += `<h3>✊ Какое улучшение разрушить у ${target.name}?</h3>`;
    if(ownedUps.length === 0){
      html += `<p>У игрока нет улучшенных предприятий.</p><button class="choice-btn" onclick="finishOpposition()">Продолжить</button>`;
    } else {
      ownedUps.forEach(c => { html += `<button class="choice-btn" onclick="oppDestroyBuilding('${c.id}')">${c.icon} ${c.name}</button>`; });
    }
  }
  html += `</div></div>`;
  app.insertAdjacentHTML('beforeend', html);
}

function renderWinner(){
  if(aiTimeout) clearTimeout(aiTimeout);
  app.innerHTML = `<div class="panel winner-banner"><h2>🏆 Браво, победил ${state.winner.name}!</h2><p>Инфраструктура мегаполиса завершена на 100%!</p><button class="big-btn" onclick="state=null;render()">Сыграть ещё раз</button></div>`;
}

let setupCount = 2;
let playerTypes = ['human', 'ai', 'ai', 'ai'];
function togglePlayerType(i){ playerTypes[i]=playerTypes[i]==='human'?'ai':'human'; render(); }

function renderSetup(){
  let html = `<div class="title"><h1>🎲 Мачи Коро: Ресурсная Добыча</h1></div><div class="setup-card"><h3>Создание лобби</h3><label>Количество участников</label><div class="player-count-row">`;
  [2,3,4].forEach(n => { html += `<button class="pc-btn ${setupCount===n?'active':''}" onclick="setupCount=${n};render()">${n}</button>`; });
  html += `</div><label style="margin-top:15px">Настройка участников</label>`;
  for(let i=0; i<setupCount; i++){
    const isAI = playerTypes[i]==='ai';
    html += `<div class="player-input-row"><input type="text" id="pname${i}" placeholder="${isAI?'Бот ИИ '+ (i+1):'Игрок '+(i+1)}"><button class="type-btn ${isAI?'active ai-type':''}" onclick="togglePlayerType(${i})">${isAI?'🤖 ИИ':'👤 Человек'}</button></div>`;
  }
  html += `<button class="big-btn" onclick="startGame()">Запустить партию</button></div>`;
  app.innerHTML = html;
}

function startGame(){
  const names = [], types = [];
  for(let i=0; i<setupCount; i++){
    let v = document.getElementById('pname'+i).value.trim();
    if(!v) v = playerTypes[i]==='ai'?`Бот ИИ ${i+1}`:`Игрок ${i+1}`;
    names.push(v); types.push(playerTypes[i]);
  }
  state = newGame(setupCount, names, types); render();
}

render();
</script>
</body>
</html>
