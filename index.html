<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Синдикат: Остров Доверия</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-color: #ffffff;
            --accent: #e74c3c;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1, h2 { margin: 5px 0; text-align: center; }
        .game-container {
            display: grid;
            grid-template-columns: 300px 1fr 300px;
            gap: 20px;
            width: 100%;
            max-width: 1200px;
        }
        .panel {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        /* Игровое поле в стиле Монополии */
        .board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 10px;
            aspect-ratio: 1;
            background: #333;
            padding: 10px;
            border-radius: 8px;
        }
        .cell {
            background: #444;
            border: 2px solid #555;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 8px;
            font-size: 12px;
            position: relative;
        }
        .cell.corner { background: #555; font-weight: bold; }
        .cell-players {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            margin-top: 5px;
        }
        .player-token {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 1px solid white;
            display: inline-block;
        }
        /* Кнопки и интерфейс */
        button {
            background: #3498db;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            margin-bottom: 10px;
            transition: 0.2s;
        }
        button:hover { background: #2980b9; }
        button:disabled { background: #555; cursor: not-allowed; }
        .btn-sabotage { background: var(--accent); }
        .btn-sabotage:hover { background: #c0392b; }
        
        .player-card {
            background: #3a3a3a;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 6px;
            border-left: 5px solid #fff;
        }
        .log {
            height: 200px;
            overflow-y: auto;
            background: #111;
            padding: 10px;
            font-size: 13px;
            border-radius: 5px;
            font-family: monospace;
        }
        .resource-list { font-size: 13px; margin: 5px 0; }
        .modal {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: var(--card-bg);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            z-index: 100;
            display: none;
            width: 320px;
        }
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 99; display: none;
        }
    </style>
</head>
<body>

    <h1>Синдикат: Остров Доверия</h1>
    <h3 id="round-display" style="color: #bbb;">Раунд: 1 | Ход: Игрок (Вы)</h3>

    <div class="game-container">
        <div class="panel">
            <h2>Синдикат</h2>
            <div id="players-status"></div>
            <hr style="border-color:#444;">
            <h3>Ваша Скрытая Роль:</h3>
            <div id="role-card" style="font-weight:bold; font-size:18px; text-align:center; padding:10px; background:#444; border-radius:5px;"></div>
        </div>

        <div id="board" class="board">
            </div>

        <div class="panel" style="display:flex; flex-direction:column; justify-content:space-between;">
            <div>
                <h2>Действия</h2>
                <button id="btn-roll" onclick="playTurn()">Бросить кубик</button>
                <button id="btn-build" onclick="buildFactory()" disabled>Построить Фабрику (50 Монет, 3 Дерева, 3 Кирпича)</button>
                <button id="btn-trade" onclick="openTrade()" disabled>Предложить сделку ИИ</button>
                <button id="btn-vote" onclick="openVote()">Собрать Совет (Голосование)</button>
                <button id="btn-sabotage" class="btn-sabotage" onclick="triggerSabotage()" style="display:none;">Совершить Саботаж (-20 монет у всех)</button>
            </div>
            <div>
                <h3>История событий</h3>
                <div id="log" class="log"></div>
            </div>
        </div>
    </div>

    <div id="overlay" class="overlay"></div>
    <div id="trade-modal" class="modal">
        <h3>Торговля с ИИ</h3>
        <p>Обменять 20 Монет на 2 случайных ресурса у случайного игрока?</p>
        <button onclick="executeTrade()">Да, предложить</button>
        <button onclick="closeModal()" style="background:#7f8c8d;">Отмена</button>
    </div>

    <div id="vote-modal" class="modal">
        <h3>Кого вы подозреваете?</h3>
        <p>Игрок под арестом теряет право строить на 2 раунда.</p>
        <div id="vote-options"></div>
        <button onclick="closeModal()" style="background:#7f8c8d; margin-top:10px;">Отмена</button>
    </div>

    <script>
        // Конфигурация клеток поля (периметр 4x4 = 12 клеток)
        const boardLayout = [
            { id: 0, name: "СТАРТ (+20 Монет)", type: "start" },
            { id: 1, name: "Лесопилка (+Дерево)", type: "resource", res: "wood" },
            { id: 2, name: "Кирпичный Завод (+Кирпич)", type: "resource", res: "brick" },
            { id: 3, name: "Казначейство (+10 Монет)", type: "money", amt: 10 },
            { id: 4, name: "Лесопилка (+Дерево)", type: "resource", res: "wood" },
            { id: 5, name: "Налоги (-10 Монет)", type: "tax", amt: 10 },
            { id: 6, name: "Кирпичный Завод (+Кирпич)", type: "resource", res: "brick" },
            { id: 7, name: "Рыночная Площадь (+20 Монет)", type: "money", amt: 20 },
            { id: 8, name: "Заброшенная Шахта", type: "empty" },
            { id: 9, name: "Лесопилка (+Дерево)", type: "resource", res: "wood" },
            { id: 10, name: "Кирпичный Завод (+Кирпич)", type: "resource", res: "brick" },
            { id: 11, name: "Центральный Банк (+30 Монет)", type: "money", amt: 30 }
        ];

        // Порядок отображения клеток на CSS Grid по периметру 4x4
        const gridPositions = [
            {r:1, c:1}, {r:1, c:2}, {r:1, c:3}, {r:1, c:4},
            {r:2, c:4}, {r:3, c:4}, {r:4, c:4}, {r:4, c:3},
            {r:4, c:2}, {r:4, c:1}, {r:3, c:1}, {r:2, c:1}
        ];

        // Инициализация игроков
        let players = [
            { id: 0, name: "Вы (Игрок)", color: "#3498db", pos: 0, coins: 50, wood: 2, brick: 2, score: 0, isSaboteur: false, isAI: false, arrestedTurns: 0, suspicion: 0 },
            { id: 1, name: "ИИ Боб", color: "#2ecc71", pos: 0, coins: 50, wood: 2, brick: 2, score: 0, isSaboteur: false, isAI: true, arrestedTurns: 0, suspicion: 10 },
            { id: 2, name: "ИИ Алиса", color: "#9b59b6", pos: 0, coins: 50, wood: 2, brick: 2, score: 0, isSaboteur: false, isAI: true, arrestedTurns: 0, suspicion: 10 },
            { id: 3, name: "ИИ Дилан", color: "#f1c40f", pos: 0, coins: 50, wood: 2, brick: 2, score: 0, isSaboteur: false, isAI: true, arrestedTurns: 0, suspicion: 10 }
        ];

        let currentPlayerIndex = 0;
        let round = 1;
        let saboteurId = 0;

        // Старт игры
        function initGame() {
            // Назначение скрытой роли Саботажника
            saboteurId = Math.floor(Math.random() * 4);
            players[saboteurId].isSaboteur = true;

            if (players[0].isSaboteur) {
                document.getElementById('role-card').innerText = "САБОТАЖНИК 😈";
                document.getElementById('role-card').style.color = "var(--accent)";
                document.getElementById('btn-sabotage').style.display = "block";
            } else {
                document.getElementById('role-card').innerText = "МИРНЫЙ ПАРТНЕР 😇";
                document.getElementById('role-card').style.color = "#2ecc71";
            }

            renderBoard();
            updateUI();
            logMessage("🚨 Игра началась! Цель Мирных: набрать 10 очков (строя фабрики) или вычислить Саботажника. Цель Саботажника: скрытно разорять игроков.");
        }

        // Рендер доски
        function renderBoard() {
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';
            
            // Создаем массив ячеек в правильном порядке сетки 4x4
            let gridCells = Array(16).fill(null);
            
            boardLayout.forEach((cell, index) => {
                const pos = gridPositions[index];
                const cellIndex = (pos.r - 1) * 4 + (pos.c - 1);
                gridCells[cellIndex] = { ...cell, originalIndex: index };
            });

            for (let i = 0; i < 16; i++) {
                const cellDiv = document.createElement('div');
                if (gridCells[i] === null) {
                    cellDiv.style.background = "transparent";
                } else {
                    const cell = gridCells[i];
                    cellDiv.className = `cell ${cell.type === 'start' ? 'corner' : ''}`;
                    cellDiv.innerHTML = `<div><b>${cell.name}</b></div><div class="cell-players" id="cell-${cell.originalIndex}"></div>`;
                }
                boardEl.appendChild(cellDiv);
            }
            updateTokens();
        }

        function updateTokens() {
            // Очищаем старые фишки
            boardLayout.forEach((_, index) => {
                const el = document.getElementById(`cell-${index}`);
                if (el) el.innerHTML = '';
            });
            // Ставим новые
            players.forEach(p => {
                const cellEl = document.getElementById(`cell-${p.pos}`);
                if (cellEl) {
                    const token = document.createElement('div');
                    token.className = 'player-token';
                    token.style.backgroundColor = p.color;
                    token.title = p.name;
                    cellEl.appendChild(token);
                }
            });
        }

        function updateUI() {
            const statusEl = document.getElementById('players-status');
            statusEl.innerHTML = '';

            players.forEach(p => {
                const card = document.createElement('div');
                card.className = 'player-card';
                card.style.borderLeftColor = p.color;
                
                // Для ИИ скрываем роль, но выводим уровень подозрений окружающих
                let statusText = p.arrestedTurns > 0 ? `<b style="color:red;">[ПОД АРЕСТОМ ${p.arrestedTurns}х]</b>` : '';
                card.innerHTML = `
                    <strong>${p.name} ${statusText}</strong><br>
                    <div class="resource-list">💰 Монеты: ${p.coins} | 🪵 Дерево: ${p.wood} | 🧱 Кирпич: ${p.brick}</div>
                    <strong>🏭 Постройки (Очки): ${p.score} / 10</strong><br>
                    <small style="color:#aaa;">Подозрения общества: ${p.id !== 0 ? p.suspicion + '%' : '—'}</small>
                `;
                statusEl.appendChild(card);
            });

            // Кнопки управления для игрока
            const human = players[0];
            document.getElementById('btn-build').disabled = !(human.coins >= 50 && human.wood >= 3 && human.brick >= 3 && human.arrestedTurns === 0);
            document.getElementById('btn-trade').disabled = (human.coins < 20);
            document.getElementById('round-display').innerText = `Раунд: ${round} | Ходит: ${players[currentPlayerIndex].name}`;
        }

        function logMessage(msg) {
            const log = document.getElementById('log');
            log.innerHTML += `<div>${msg}</div>`;
            log.scrollTop = log.scrollHeight;
        }

        // Логика хода игрока
        function playTurn() {
            document.getElementById('btn-roll').disabled = true;
            let activePlayer = players[currentPlayerIndex];

            if (activePlayer.arrestedTurns > 0) {
                logMessage(`🔒 ${activePlayer.name} пропускает активность (под арестом). Осталось раундов: ${activePlayer.arrestedTurns - 1}`);
                activePlayer.arrestedTurns--;
                nextTurn();
                return;
            }

            let dice = Math.floor(Math.random() * 3) + 1; // Кубик 1-3 для динамики на маленьком поле
            activePlayer.pos = (activePlayer.pos + dice) % boardLayout.length;
            
            let cell = boardLayout[activePlayer.pos];
            logMessage(`🎲 ${activePlayer.name} выбросил ${dice} и встал на клетку: <b>${cell.name}</b>`);

            // Эффект клетки
            if (cell.type === 'resource') {
                activePlayer[cell.res] += 1;
                logMessage(`➕ ${activePlayer.name} получает 1 ед. ресурса [${cell.res}]`);
            } else if (cell.type === 'money') {
                activePlayer.coins += cell.amt;
            } else if (cell.type === 'tax') {
                activePlayer.coins = Math.max(0, activePlayer.coins - cell.amt);
                logMessage(`💸 ${activePlayer.name} оплатил налог ${cell.amt} монет.`);
            } else if (cell.type === 'start') {
                activePlayer.coins += 20;
            }

            updateTokens();
            updateUI();

            // Если это Саботажник-ИИ, с шансом 35% он вредит
            if (activePlayer.isAI && activePlayer.isSaboteur && Math.random() < 0.35) {
                aiSabotage(activePlayer);
            }

            // Логика ИИ по строительству
            if (activePlayer.isAI && activePlayer.coins >= 50 && activePlayer.wood >= 3 && activePlayer.brick >= 3) {
                activePlayer.coins -= 50; activePlayer.wood -= 3; activePlayer.brick -= 3;
                activePlayer.score += 2;
                logMessage(`🏭 <b>${activePlayer.name}</b> построил Фабрику и получил 2 очка!`);
                checkWinCondition();
            }

            setTimeout(nextTurn, 1500);
        }

        function nextTurn() {
            currentPlayerIndex = (currentPlayerIndex + 1) % 4;
            if (currentPlayerIndex === 0) {
                round++;
                document.getElementById('btn-roll').disabled = false;
            }
            updateUI();

            if (currentPlayerIndex !== 0) {
                // Ход искусственного интеллекта
                setTimeout(playTurn, 1000);
            }
        }

        // Действия Человека: Строительство
        function buildFactory() {
            let p = players[0];
            p.coins -= 50; p.wood -= 3; p.brick -= 3;
            p.score += 2;
            logMessage(`🏭 Вы построили Фабрику! (+2 Очка)`);
            updateUI();
            checkWinCondition();
        }

        // Саботаж (доступно игроку, если он предатель)
        function triggerSabotage() {
            players.forEach(p => {
                if (p.id !== 0) p.coins = Math.max(0, p.coins - 20);
            });
            logMessage(`🚨 <b>Кризис!</b> Кто-то совершил скрытый саботаж! Все ИИ-игроки потеряли по 20 монет.`);
            document.getElementById('btn-sabotage').disabled = true;
            
            // ИИ начинают подозревать друг друга и игрока сильнее после кризиса
            players.forEach(p => { if(p.id !== 0) p.suspicion += Math.floor(Math.random() * 20) + 10; });
            updateUI();
        }

        // Внутренний саботаж со стороны ИИ
        function aiSabotage(aiPlayer) {
            players.forEach(p => {
                if (p.id !== aiPlayer.id) p.coins = Math.max(0, p.coins - 15);
            });
            logMessage(`📉 <b>Прошелся слух:</b> На рынке совершен поджог складов! Все понесли убытки.`);
            // При саботаже ИИ случайным образом растет уровень подозрений к невиновным
            players.forEach(p => {
                if(p.id !== 0 && Math.random() > 0.5) p.suspicion += 15;
            });
        }

        // Торговля
        function openTrade() {
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('trade-modal').style.display = 'block';
        }

        function executeTrade() {
            closeModal();
            let partner = players[Math.floor(Math.random() * 3) + 1]; // Случайный ИИ
            players[0].coins -= 20;
            
            // ИИ принимает сделку, если доверяет (подозрение < 50)
            if (partner.suspicion < 50 && (partner.wood > 0 || partner.brick > 0)) {
                partner.coins += 20;
                players[0].wood += 1;
                players[0].brick += 1;
                logMessage(`🤝 Успешная сделка! Сделка с ${partner.name} принесла вам ресурсы.`);
                // Улучшение отношений
                partner.suspicion = Math.max(0, partner.suspicion - 10);
            } else {
                players[0].coins += 20; // Возврат
                logMessage(`❌ ${partner.name} отклонил предложение о торговле из-за недоверия.`);
            }
            updateUI();
        }

        // Голосование (Мафия-механика)
        function openVote() {
            document.getElementById('overlay').style.display = 'block';
            const voteModal = document.getElementById('vote-modal');
            voteModal.style.display = 'block';
            
            const opts = document.getElementById('vote-options');
            opts.innerHTML = '';
            
            players.forEach(p => {
                if (p.id !== 0) {
                    const btn = document.createElement('button');
                    btn.innerText = `Обвинить: ${p.name}`;
                    btn.onclick = () => executeVote(p.id);
                    opts.appendChild(btn);
                }
            });
        }

        function executeVote(targetId) {
            closeModal();
            logMessage(`📢 Вы созвали Совет Синдиката и выдвинули обвинения против ${players[targetId].name}!`);
            
            // ИИ голосуют на основе своих подозрений
            let votes = [0, 0, 0, 0];
            votes[targetId]++; // Ваш голос
            
            players.forEach(p => {
                if (p.isAI) {
                    // ИИ голосует за того, у кого максимальное подозрение, либо против Саботажника с малым шансом
                    let target = 0;
                    let maxSusp = -1;
                    players.forEach(pSub => {
                        if(pSub.id !== p.id && pSub.suspicion > maxSusp) {
                            maxSusp = pSub.suspicion;
                            target = pSub.id;
                        }
                    });
                    votes[target]++;
                }
            });

            // Находим лидера голосования
            let maxVotes = 0;
            let votedOutId = -1;
            votes.forEach((v, idx) => {
                if (v > maxVotes) { maxVotes = v; votedOutId = idx; }
            });

            logMessage(`📊 Результаты трибунала: Игрок под подозрением — <b>${players[votedOutId].name}</b> (${maxVotes} голосов).`);
            
            if (players[votedOutId].isSaboteur) {
                logMessage(`🎉 Успех! <b>${players[votedOutId].name}</b> действительно был Саботажником! Он изолирован. Мирные победили!`);
                setTimeout(() => alert("Победа Мирных Партнеров! Саботажник раскрыт."), 500);
            } else {
                logMessage(`⛔ Ошибка! <b>${players[votedOutId].name}</b> был честным партнером. Он отправлен под домашний арест на 2 раунда и теряет ресурсы.`);
                players[votedOutId].arrestedTurns = 2;
                players[votedOutId].coins = Math.floor(players[votedOutId].coins / 2);
            }
            updateUI();
        }

        function closeModal() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('trade-modal').style.display = 'none';
            document.getElementById('vote-modal').style.display = 'none';
        }

        function checkWinCondition() {
            players.forEach(p => {
                if (p.score >= 10) {
                    if (p.isSaboteur) {
                        alert(`Игра окончена! Саботажник (${p.name}) победил, захватив контроль над островом!`);
                    } else {
                        alert(`Игра окончена! Честный игрок (${p.name}) победил, построив сильный бизнес!`);
                    }
                    location.reload();
                }
            });
        }

        // Запуск
        window.onload = initGame;
    </script>
</body>
</html>
