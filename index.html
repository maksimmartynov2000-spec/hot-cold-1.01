function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

function getNextUniqueCard(deck, currentMarket) {
  for (let i = deck.length - 1; i >= 0; i--) {
    const candidateId = deck[i];
    if (!currentMarket.includes(candidateId)) {
      return deck.splice(i, 1)[0];
    }
  }
  return deck.pop(); 
}

function newGame(numPlayers, setupPlayers){
  const supply = {};
  maxLogLines = numPlayers * 4; 
  
  const deckBaseOld = []; OLD_BASE.forEach(c => { supply[c.id] = 6; for(let i=0; i<6; i++) deckBaseOld.push(c.id); });
  const deckBaseNew = []; NEW_BASE.forEach(c => { supply[c.id] = 6; for(let i=0; i<6; i++) deckBaseNew.push(c.id); });
  const deckUpgradeOld = []; OLD_UPGRADES.forEach(c => { supply[c.id] = 6; for(let i=0; i<6; i++) deckUpgradeOld.push(c.id); });
  const deckUpgradeNew = []; NEW_UPGRADES.forEach(c => { supply[c.id] = 6; for(let i=0; i<6; i++) deckUpgradeNew.push(c.id); });

  shuffle(deckBaseOld); shuffle(deckBaseNew); shuffle(deckUpgradeOld); shuffle(deckUpgradeNew);

  const marketBaseOld = [];
  while(marketBaseOld.length < 4 && deckBaseOld.length > 0) {
    let card = getNextUniqueCard(deckBaseOld, marketBaseOld);
    if(card) { marketBaseOld.push(card); }
  }

  const marketBaseNew = [];
  while(marketBaseNew.length < 4 && deckBaseNew.length > 0) {
    let card = getNextUniqueCard(deckBaseNew, marketBaseNew);
    if(card) { marketBaseNew.push(card); }
  }

  const marketUpgradeOld = [];
  while(marketUpgradeOld.length < 2 && deckUpgradeOld.length > 0) {
    let card = getNextUniqueCard(deckUpgradeOld, marketUpgradeOld);
    if(card) { marketUpgradeOld.push(card); }
  }

  const marketUpgradeNew = [];
  while(marketUpgradeNew.length < 2 && deckUpgradeNew.length > 0) {
    let card = getNextUniqueCard(deckUpgradeNew, marketUpgradeNew);
    if(card) { marketUpgradeNew.push(card); }
  }

  const players = [];
  for(let i=0; i<numPlayers; i++){
    const lm = {}; ALL_LANDMARKS.forEach(l => { lm[l.id] = false; });
    players.push({
      name: setupPlayers[i].name || (setupPlayers[i].isAI ? `Бот ${i+1} 🤖` : `Игрок ${i+1}`),
      isAI: setupPlayers[i].isAI,
      coins: 5,       
      cards: {},      
      landmarks: lm,
      skipNext: false,
    });
  }

  return {
    players, supply, 
    deckBaseOld, deckBaseNew, deckUpgradeOld, deckUpgradeNew,
    marketBaseOld, marketBaseNew, marketUpgradeOld, marketUpgradeNew,
    current: 0, log: [], phase: 'roll',
    lastRoll: null, usedReroll: false, bonusReroll: false, pending: null, pendingSpy: null,
    winner: null, extraTurn: false, purchasesRemaining: 1,
  };
}

function log(msg){ 
  state.log.unshift(msg); 
  if(state.log.length > maxLogLines) state.log.pop(); 
}
function curPlayer(){ return state.players[state.current]; }
function count(player, id){ return player.cards[id]||0; }

/* ======================= ИГРОВАЯ ЛОГИКА ======================= */
function rollDice(numDice){
  state.log = []; 
  const dice = [];
  for(let i=0; i<numDice; i++) dice.push(1+Math.floor(Math.random()*6));
  state.lastRoll = dice;
  state.usedReroll = false;
  resolveRoll(dice, false);
  render();

  if(curPlayer().isAI && state.phase === 'postroll') {
    setTimeout(aiTurnMarket, 1200);
  }
}

function rerollAll(){
  const p = curPlayer();
  const eligible = (p.landmarks.airport && !state.usedReroll) || state.bonusReroll;
  if(!eligible || p.landmarks.airportUp) return;
  if(state.bonusReroll) state.bonusReroll=false; else state.usedReroll=true;
  const dice = state.lastRoll.map(() => 1+Math.floor(Math.random()*6));
  state.lastRoll = dice;
  log('🔁 Переброшены все кубики: ' + dice.join(' + '));
  resolveRoll(dice, true);
  render();
}

function resolveRoll(dice, isReroll){
  const total = dice.reduce((a,b)=>a+b,0);
  if(!isReroll) log('🎲 ' + curPlayer().name + ' выбросил(а): ' + dice.join(' + ') + ' = ' + total);
  else log('   Новый результат суммы: ' + total);

  state.players.forEach(p => {
    ALL_ESTABLISHMENTS.forEach(card => {
      if(!card.activation.includes(total)) return;
      if(card.requiresPort && !p.landmarks.port) return;
      if(card.requiresPortUp && !p.landmarks.portUp) return;
      const c = count(p, card.id);
      if(c <= 0) return;

      let baseAmount = 0;
      
      if(card.special === 'potato' || card.special === 'potatoU'){
        const mult = card.special === 'potato' ? 1 : 2;
        const countPotato = count(p, 'hpotato') + count(p, 'hpotatoU');
        baseAmount = mult * countPotato * c;
      } else if(card.special === 'poultry' || card.special === 'poultryU'){
        const mult = card.special === 'poultry' ? 1 : 2;
        const globalPoultry = state.players.reduce((s,pl) => s + count(pl,'hpoultry') + count(pl,'hpoultryU'), 0);
        baseAmount = mult * globalPoultry * c;
      } else if(card.special === 'meatfarm' || card.special === 'meatfarmU'){
        const hasBlocker = count(p,'hpoultry')>0 || count(p,'hpoultryU')>0 || count(p,'hpig')>0 || count(p,'hpigU')>0;
        const rate = card.special === 'meatfarm' ? 2 : 4;
        const full = rate * c;
        baseAmount = hasBlocker ? Math.floor(full/2) : full;
      } else if(card.special === 'oilwell' || card.special === 'oilwellU'){
        const penalty = card.special === 'oilwell' ? 4 : 1;
        const totalWells = state.players.reduce((s,pl) => s + count(pl,'ngas') + count(pl,'ngasU'), 0);
        const others = totalWells - 1;
        baseAmount = (card.income - penalty*others) * c;
      } else if(card.id === 'nsea' || card.id === 'nseaU') {
        if(total % 2 === 0) baseAmount = (card.id === 'nsea' ? 2 : 4) * c;
      } else {
        baseAmount = card.income * c;
      }

      if (baseAmount !== 0) {
        let multiplier = 1;
        if(p.landmarks.engineering && card.tag === 'gear') multiplier += 1;
        if(p.landmarks.animalhusbandry && ['fish', 'meat', 'ear'].includes(card.tag)) multiplier += (card.symbolCount || 1);
        
        let finalAmount = baseAmount * multiplier;
        p.coins += finalAmount;
        const sign = finalAmount >= 0 ? '+' : '';
        log(`🔹 ${p.name}: ${card.icon}${TAG_ICONS[card.tag]} ${card.name} приносит ${sign}${finalAmount} 💰 (x${multiplier})`);
      }
    });

    if(p.coins < 0) p.coins = 0;

    if(p.coins === 0) {
      p.coins = 1;
      log(`🎁 Субсидия: Банк начислил ${p.name} +1 💰, так как у него 0 монет.`);
    }
  });

  const active = curPlayer();
  if(active.landmarks.coup && [1,2,3].includes(total)){
    state.players.forEach((p,i) => { if(i !== state.current) p.skipNext = true; });
    log('⚡ Переворот: все остальные игроки пропустят ход!');
  }

  if(dice.length===2 && dice[0]===dice[1] && active.landmarks.portUp){
    state.extraTurn = true; log('✨ Дубль! Назначен доп. ход.');
  }
  if(dice.length===3 && dice[0]===dice[1] && dice[1]===dice[2] && active.landmarks.stationUp){
    state.purchasesRemaining += 2; log('✨ Тройной дубль! Доступно +2 покупки.');
  }

  state.phase = 'postroll';
}

function buyCard(id, marketType, slotIndex){
  if(state.purchasesRemaining <= 0) return;
  const p = curPlayer();
  const card = ALL_ESTABLISHMENTS.find(c => c.id === id);
  if(!card || state.supply[id] <= 0 || p.coins < card.cost) return;

  if(card.upgradeOf){
    if(!p.landmarks.modernization || count(p, card.upgradeOf) < 1) return;
    p.coins -= card.cost;
    p.cards[card.upgradeOf] -= 1;
    p.cards[id] = (p.cards[id]||0) + 1;
    state.supply[id]--;
    const baseCard = ALL_ESTABLISHMENTS.find(c => c.id === card.upgradeOf);
    log(`⚙️ ${p.name} улучшил: ${baseCard.name} → ${card.name}`);
  } else {
    p.coins -= card.cost;
    p.cards[id] = (p.cards[id]||0) + 1;
    state.supply[id]--;
    log(`🛒 ${p.name} купил(а): ${card.name}`);
  }

  // Слот меняется на новую карту только тогда, когда запас купленной карты закончился (0)
  if(state.supply[id] <= 0) {
    let deck, market;
    if(marketType === 'baseOld') { deck = state.deckBaseOld; market = state.marketBaseOld; }
    else if(marketType === 'baseNew') { deck = state.deckBaseNew; market = state.marketBaseNew; }
    else if(marketType === 'upgradeOld') { deck = state.deckUpgradeOld; market = state.marketUpgradeOld; }
    else if(marketType === 'upgradeNew') { deck = state.deckUpgradeNew; market = state.marketUpgradeNew; }

    if(deck && deck.length > 0) {
      const nextUnique = getNextUniqueCard(deck, market);
      if(nextUnique) { market[slotIndex] = nextUnique; }
      else { market.splice(slotIndex, 1); }
    } else {
      market.splice(slotIndex, 1);
    }
  }

  state.purchasesRemaining--;
  render();
}

function buildLandmark(id){
  const p = curPlayer();
  const lm = ALL_LANDMARKS.find(l => l.id === id);
  if(!lm || p.landmarks[id] || p.coins < lm.cost) return;
  if(lm.upgradeOf && (!p.landmarks.innovations || !p.landmarks[lm.upgradeOf])) return;

  p.coins -= lm.cost;
  p.landmarks[id] = true;
  log(`🏗️ ${p.name} возвёл: ${lm.icon} ${lm.name}`);

  if(POLITICAL_LANDMARKS.every(l => p.landmarks[l.id])) state.winner = p;
  render();
}

function endTurn(){
  if(state.winner){ render(); return; }
  if(state.extraTurn){
    log('✨ Дополнительный ход активного игрока!'); state.extraTurn = false;
  } else {
    let next = (state.current+1)%state.players.length;
    let guard = 0;
    while(state.players[next].skipNext && guard < state.players.length){
      log(`⏭️ ${state.players[next].name} пропускает ход`);
      state.players[next].skipNext = false;
      next = (next+1)%state.players.length; guard++;
    }
    state.current = next;
  }
  state.lastRoll = null; state.usedReroll = false; state.bonusReroll = false;
  state.purchasesRemaining = 1; state.phase = 'roll';
  render();

  if(curPlayer().isAI && state.phase === 'roll') {
    setTimeout(aiTurnRoll, 1000);
  }
}

/* ======================= ЛОГИКА ИИ (БОТА) ======================= */
function aiTurnRoll() {
  if(!curPlayer().isAI || state.phase !== 'roll') return;
  const p = curPlayer();
  let diceToRoll = 1;
  if(p.landmarks.station) diceToRoll = 3;
  else if(p.landmarks.port) diceToRoll = 2;
  rollDice(diceToRoll);
}

function aiTurnMarket() {
  if(!curPlayer().isAI || state.phase !== 'postroll') return;
  const p = curPlayer();
  
  const nextPol = POLITICAL_LANDMARKS.find(l => !p.landmarks[l.id]);
  if(nextPol && p.coins >= nextPol.cost) { buildLandmark(nextPol.id); endTurn(); return; }

  const nextRes = RESEARCH_LANDMARKS.concat(INFRA_LANDMARKS).find(l => !p.landmarks[l.id] && p.coins >= l.cost && (!l.upgradeOf || p.landmarks[l.upgradeOf]));
  if(nextRes && p.coins >= nextRes.cost && Math.random() > 0.4) { buildLandmark(nextRes.id); endTurn(); return; }

  const tryBuyFrom = (marketArr, type) => {
    for(let i=0; i<marketArr.length; i++) {
      const card = ALL_ESTABLISHMENTS.find(c => c.id === marketArr[i]);
      if(card && p.coins >= card.cost && state.supply[card.id] > 0) {
        if(card.upgradeOf && (!p.landmarks.modernization || count(p, card.upgradeOf) < 1)) continue;
        if(card.requiresPort && !p.landmarks.port) continue;
        if(card.requiresPortUp && !p.landmarks.portUp) continue;
        buyCard(card.id, type, i);
        return true;
      }
    }
    return false;
  };

  if(state.purchasesRemaining > 0) {
    let bought = tryBuyFrom(state.marketUpgradeNew, 'upgradeNew');
    if(!bought) bought = tryBuyFrom(state.marketBaseNew, 'baseNew');
    if(!bought) bought = tryBuyFrom(state.marketUpgradeOld, 'upgradeOld');
    if(!bought) bought = tryBuyFrom(state.marketBaseOld, 'baseOld');
  }

  endTurn();
}

const app = document.getElementById('app');

function toggleGuide(show) {
  showGuide = show;
  render();
}

function render(){

  if(state.winner){ renderWinner(); return; }

  const p = curPlayer();
  const inRollPhase = state.phase==='roll';
  const inPostroll = state.phase==='postroll';
  const canReroll = (p.landmarks.airport && !state.usedReroll);

  let html = `<div class="title"><h1>🎲 ДОБЫЧА</h1><div class="sub">Рыба, Мясо, Колоски • Стартовый капитал: 5 монет</div></div>`;
  html += `<div class="board"><div>`;

  html += `<div class="panel"><div class="players-strip">`;
  state.players.forEach((pl, i) => {
    html += `<div class="player-chip ${i===state.current?'current':''}">`;
    if(i===state.current) html += `<div class="turn-badge">▶</div>`;
    html += `<div class="pname">${pl.name} ${pl.isAI?'🤖':''}</div><div class="coins">💰 ${pl.coins} Монет</div>`;
    html += `<div class="lm-row">`;
    ALL_LANDMARKS.forEach(l => { if(pl.landmarks[l.id]) html += `<span class="lm-icon built" title="${l.name}">${l.icon}</span>`; });
    html += `</div><div class="my-establishments">`;
    ALL_ESTABLISHMENTS.forEach(c => { const cnt=count(pl,c.id); if(cnt>0) html += `<div class="mini-card">${c.icon}${TAG_ICONS[c.tag]} x${cnt}</div>`; });
    html += `</div></div>`;
  });
  html += `</div></div>`;

  html += `<div class="panel">`;
  html += `<div class="dice-area">`;
  if(state.lastRoll){
    html += `<div class="dice">` + state.lastRoll.map((d) => `<div class="die-wrap"><div class="die">${d}</div></div>`).join('') + `</div>`;
    html += `<div style="font-weight:bold; margin-left:10px;">Сумма: ${state.lastRoll.reduce((a,b)=>a+b,0)}</div>`;
  }
  if(inRollPhase && !p.isAI){
    html += `<button class="action-btn primary" onclick="rollDice(1)">1 кубик</button>`;
    if(p.landmarks.port) html += `<button class="action-btn primary" onclick="rollDice(2)">2 кубика</button>`;
    if(p.landmarks.station) html += `<button class="action-btn primary" onclick="rollDice(3)">3 кубика</button>`;
  }
  if(inPostroll && canReroll && !p.isAI){
    html += `<button class="action-btn" onclick="rerollAll()">✈️ Сбросить кубы</button>`;
  }
  html += `</div>`;

  if(inPostroll && !p.isAI){
    html += `<button class="action-btn primary" onclick="endTurn()">Передать ход →</button>`;
  } else if (p.isAI) {
    html += `<div style="color: #c99a2e; font-weight: bold; padding: 5px 0;">🤖 Ход делает искусственный интеллект...</div>`;
  }
  
  html += `<div class="log-section" style="margin-top:10px;">`;
  html += `<button class="action-btn" style="background:#e0cfa6;" onclick="toggleGuide(true)">📋 Справочник карт и улучшений</button>`;
  html += `<div class="log" id="gameLog">` + state.log.map(l=>`<div>${l}</div>`).join('') + `</div>`;
  html += `</div></div>`;

  html += renderMarketSection('🏙️ Базовые предприятия — 4 карты', state.marketBaseOld, 'baseOld', p, inPostroll);
  html += renderMarketSection('⚙️ Новые предприятия (Шестерёнки) — 4 карты', state.marketBaseNew, 'baseNew', p, inPostroll);
  html += renderMarketSection('🌾 Улучшения предприятий (Старый набор) — 2 карты', state.marketUpgradeOld, 'upgradeOld', p, inPostroll);
  html += renderMarketSection('🚀 Улучшения предприятий (Новые карты) — 2 карты', state.marketUpgradeNew, 'upgradeNew', p, inPostroll);

  html += `</div>`; 

  html += `<div>`;
  html += renderLandmarkSection('🏗️ Инфраструктура', 'infra', INFRA_LANDMARKS, p, inPostroll);
  html += renderLandmarkSection('🔬 Исследования', 'research', RESEARCH_LANDMARKS, p, inPostroll);
  html += renderLandmarkSection('🏛️ Ветка Политики (Победа)', 'political', POLITICAL_LANDMARKS, p, inPostroll);
  html += `</div></div>`;

  // Отрендерить модальное окно, если флаг активен
  if(showGuide) {
    html += renderGuideModal();
  }

  app.innerHTML = html;
}

function renderMarketSection(title, marketArr, marketType, p, inPostroll) {
  let html = `<div class="panel"><h3 class="section-title">${title}</h3><div class="cards-grid">`;
  marketArr.forEach((id, index) => {
    const c = ALL_ESTABLISHMENTS.find(x => x.id === id); if(!c) return;
    const owned = count(p, c.id);
    let disabled = !inPostroll || p.isAI || state.purchasesRemaining <= 0 || state.supply[c.id] <= 0 || p.coins < c.cost;
    
    if(c.upgradeOf) {
      if(!p.landmarks.modernization || count(p, c.upgradeOf) < 1) disabled = true;
    }
    if(c.requiresPort && !p.landmarks.port) disabled = true;
    if(c.requiresPortUp && !p.landmarks.portUp) disabled = true;

    html += `<div class="card blue-type">`;
    if(owned > 0) html += `<div class="owned-badge">${owned}</div>`;
    html += `<div class="icon">${c.icon} <span class="extra-tag">${TAG_ICONS[c.tag]}</span></div><div class="name">${c.name}</div>`;
    html += `<div class="activation">🎲 ${c.activation.join('/')}</div>`;
    html += `<div class="desc">${c.desc}</div>`;
    html += `<div class="footer"><span class="cost">${c.cost} 💰</span><span class="supply">Запас: ${state.supply[c.id]}</span></div>`;
    html += `<button class="buy-btn" ${disabled?'disabled':''} onclick="buyCard('${c.id}', '${marketType}', ${index})">${c.upgradeOf?'Улучшить':'Купить'}</button>`;
    html += `</div>`;
  });
  html += `</div></div>`;
  return html;
}

function renderLandmarkSection(title, cat, list, p, inPostroll){
  let html = `<div class="panel"><span class="subsection-title ${cat}">${title}</span><div class="landmarks-grid" style="margin-top:10px">`;
  list.forEach(l => {
    const built = p.landmarks[l.id];
    let disabled = !inPostroll || p.isAI || built || p.coins < l.cost;
    if(l.upgradeOf && (!p.landmarks.innovations || !p.landmarks[l.upgradeOf])) disabled = true;

    html += `<div class="landmark ${built?'built':''}">`;
    html += `<div class="name">${l.icon} ${l.name}</div><div class="desc">${l.desc}</div>`;
    html += `<div class="footer"><span class="cost">${built?'Построено ✅':l.cost+' 💰'}</span>`;
    if(!built) html += `<button class="buy-btn" ${disabled?'disabled':''} onclick="buildLandmark('${l.id}')">Строить</button>`;
    html += `</div></div>`;
  });
  html += `</div></div>`;
  return html;
}

function initCustomGame(){
  const setupArr = [];
  for(let i=0; i<currentSetupCount; i++) {
    const nameVal = document.getElementById(`name_${i}`).value.trim();
    const isAiVal = document.getElementById(`ai_${i}`).checked;
    setupArr.push({ name: nameVal, isAI: isAiVal });
  }
  state = newGame(currentSetupCount, setupArr);
  log(`🎲 Игра запущена. У всех игроков по 5 монет и пустое поле построек. Ход игрока: ${state.players[0].name}`);
  render();
}

renderSetup();
</script>
