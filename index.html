<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Эволюция: Настольная Игра</title>
    <style>
        :root {
            --bg: #0b131a;
            --panel-bg: #13222d;
            --text: #e6f1f6;
            --accent-green: #2ecc71;
            --accent-red: #e74c3c;
            --accent-blue: #3498db;
            --gold: #f1c40f;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        /* Экран настроек */
        #setup-screen {
            background: var(--panel-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            max-width: 400px;
            width: 100%;
            margin-top: 50px;
            border: 1px solid #233948;
        }
        select, button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        select { background: #1b2e3c; color: white; border: 1px solid #34495e; }
        button { background: var(--accent-green); color: #000; transition: 0.2s; }
        button:hover { background: #27ae60; transform: translateY(-1px); }
        button:disabled { background: #444; color: #777; cursor: not-allowed; }

        /* Игровой интерфейс */
        #game-screen {
            display: none;
            width: 100%;
            max-width: 1300px;
            grid-template-columns: 1fr 340px;
            gap: 20px;
        }

        .main-board { display: flex; flex-direction: column; gap: 20px; }
        
        .status-bar {
            background: var(--panel-bg);
            padding: 15px 20px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #233948;
        }

        /* Кормовая база */
        .food-bank {
            background: #1c3648;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            font-size: 18px;
            border: 2px dashed var(--gold);
        }
        .food-token {
            display: inline-block;
            width: 20px;
            height: 20px;
            background: var(--gold);
            border-radius: 50%;
            margin: 0 4px;
        }

        /* Игровые зоны экосистем */
        .ecosystem {
            background: #111e27;
            border-radius: 12px;
            padding: 15px;
            border: 1px solid #1f313e;
        }
        .animals-container {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding: 10px 0;
            min-height: 160px;
        }

        /* Карточка животного */
        .animal-card {
            background: #1a2f3e;
            border: 2px solid #2c4a61;
            border-radius: 10px;
            min-width: 130px;
            max-width: 160px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            cursor: pointer;
        }
        .animal-card.fed { border-color: var(--accent-green); box-shadow: 0 0 10px rgba(46,204,113,0.3); }
        .animal-card.hungry { border-color: var(--accent-red); }
        .animal-card.selected { border-color: var(--gold); transform: scale(1.03); }

        .trait-badge {
            background: #2c3e50;
            font-size: 11px;
            padding: 3px 6px;
            border-radius: 4px;
            margin-top: 4px;
            text-align: center;
        }
        .trait-badge.predator { background: #962d22; }
        .trait-badge.swimming { background: #2980b9; }

        /* Рука карт игрока */
        .player-hand {
            background: var(--panel-bg);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #233948;
        }
        .hand-cards { display: flex; gap: 12px; overflow-x: auto; padding: 10px 0; }
        
        .trait-card {
            background: #254257;
            border: 1px solid #345e7c;
            border-radius: 8px;
            min-width: 120px;
            padding: 10px;
            text-align: center;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 10px;
        }
        .trait-card:hover { background: #2c4f69; border-color: var(--accent-blue); }

        /* Боковая панель */
        .side-panel {
            background: var(--panel-bg);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #233948;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .log {
            background: #070d11;
            border-radius: 8px;
            padding: 10px;
            height: 250px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 12px;
            border: 1px solid #162633;
        }
    </style>
</head>
<body>

    <!-- ЭКРАН НАСТРОЕК -->
    <div id="setup-screen">
        <h1 style="color:var(--accent-green); margin-bottom:5px;">🧬 ЭВОЛЮЦИЯ</h1>
        <p style="color:#8af; margin-top:0;">Классическое издание</p>
        <hr style="border-color:#233948; margin:20px 0;">
        <label for="ai-count" style="font-size:14px; display:block; margin-bottom:5px;">Выберите количество ИИ-противников:</label>
        <select id="ai-count">
            <option value="1">1 Противник (Дуэль)</option>
            <option value="2">2 Противника</option>
            <option value="3" selected>3 Противника</option>
        </select>
        <button onclick="startGame()">Создать популяцию</button>
    </div>

    <!-- ИГРОВОЙ ЭКРАН -->
    <div id="game-screen">
        <!-- Левая (главная) часть -->
        <div class="main-board">
            <div class="status-bar">
                <div><h2>Фаза: <span id="current-phase" style="color:var(--accent-blue);">Развитие</span></h2></div>
                <div id="turn-display" style="font-weight:bold;">Раунд: 1</div>
            </div>

            <!-- Кормовая база -->
            <div class="food-bank" id="food-zone" style="display:none;">
                <strong>🍇 Доступная еда: <span id="food-count">0</span> ед.</strong>
                <div id="food-tokens-container" style="margin-top:5px;"></div>
            </div>

            <!-- Экосистемы (Стол) -->
            <div id="ecosystems-container" style="display:flex; flex-direction:column; gap:15px;">
                <!-- Сюда генерятся столы игроков -->
            </div>

            <!-- Рука карт игрока -->
            <div class="player-hand">
                <h3 style="margin:0 0 10px 0; display:flex; justify-content:space-between;">
                    <span>🎴 Ваша рука карт</span>
                    <small style="color:#aaa; font-size:12px;">Нажмите карту $\rightarrow$ выберите действие</small>
                </h3>
                <div id="my-hand" class="hand-cards"></div>
            </div>
        </div>

        <!-- Правая (панель управления) -->
        <div class="side-panel">
            <h3 style="margin-top:0;">🎮 Управление</h3>
            
            <div id="controls" style="display:flex; flex-direction:column; gap:10px;">
                <button id="btn-pass" onclick="playerPass()" style="background:#e67e22; color:white;">Пас / Завершить фазу</button>
            </div>

            <hr style="border-color:#233948;">
            <h4 style="margin:0;">📜 Летопись эволюции:</h4>
            <div id="log" class="log"></div>

            <div id="score-board" style="font-size:13px; background:#1a2f3e; padding:10px; border-radius:8px;">
                <strong>Очки выживших:</strong><div id="scores-list"></div>
            </div>
        </div>
    </div>

    <script>
        // Свойства карт оригинальной игры
        const TRAITS = [
            { id: "predator", name: "Хищник", desc: "Может атаковать других животных ради еды. Нужна +1 еда." },
            { id: "swimming", name: "Водоплавающее", desc: "Хищник без 'Водоплавающее' не может его атаковать." },
            { id: "big", name: "Большое", desc: "Хищник без 'Большое' не может его атаковать. Нужна +1 еда." },
            { id: "camouflage", name: "Камуфляж", desc: "Хищник без 'Острое зрение' не может атаковать." }
        ];

        let players = [];
        let phase = "development"; // development -> feeding -> extinction
        let foodBank = 0;
        let round = 1;
        let activePlayerIndex = 0;
        let selectedHandCardIndex = null;
        let selectedPredatorAnimal = null;

        function startGame() {
            const aiCount = parseInt(document.getElementById('ai-count').value);
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'grid';

            // Создаем сущности игроков
            players.push({ id: 0, name: "Вы (Игрок)", isAI: false, hand: [], animals: [], score: 0, passed: false });
            for (let i = 1; i <= aiCount; i++) {
                players.push({ id: i, name: `ИИ Противник ${i}`, isAI: true, hand: [], animals: [], score: 0, passed: false });
            }

            // Раздаем стартовые карты (по 6 карт согласно правилам базовой игры)
            players.forEach(p => {
                for (let k = 0; k < 6; k++) p.hand.push(getRandomTrait());
            });

            logMessage("🌿 Игра началась! Фаза Развития. Вы можете выложить новое существо или добавить свойство уже существующему.");
            initRound();
        }

        function getRandomTrait() {
            return TRAITS[Math.floor(Math.random() * TRAITS.length)];
        }

        function initRound() {
            players.forEach(p => { p.passed = false; });
            phase = "development";
            document.getElementById('current-phase').innerText = "Развитие";
            document.getElementById('current-phase').style.color = "var(--accent-blue)";
            document.getElementById('food-zone').style.display = 'none';
            
            // Если у кого-то нет карт и животных — выдаем 1 карту спасения
            players.forEach(p => {
                if (p.hand.length === 0 && p.animals.length === 0) {
                    p.hand.push(getRandomTrait());
                }
            });

            updateUI();
        }

        function updateUI() {
            document.getElementById('turn-display').innerText = `Раунд: ${round}`;
            
            // Отрисовка стола/экосистем
            const container = document.getElementById('ecosystems-container');
            container.innerHTML = '';

            players.forEach(p => {
                const eco = document.createElement('div');
                eco.className = 'ecosystem';
                eco.innerHTML = `<h3>🐾 Биом: ${p.name} <small style="color:#aaa;">(Карт в руке: ${p.hand.length})</small></h3>`;
                
                const animsContainer = document.createElement('div');
                animsContainer.className = 'animals-container';

                p.animals.forEach((animal, aIdx) => {
                    const card = document.createElement('div');
                    // Проверка сытости
                    const reqFood = calculateRequiredFood(animal);
                    const isFed = animal.currentFood >= reqFood;
                    card.className = `animal-card ${isFed ? 'fed' : 'hungry'}`;
                    
                    if (selectedPredatorAnimal && selectedPredatorAnimal.player === p.id && selectedPredatorAnimal.index === aIdx) {
                        card.classList.add('selected');
                    }

                    let traitsHTML = animal.traits.map(t => `<div class="trait-badge ${t.id}">${t.name}</div>`).join('');
                    
                    card.innerHTML = `
                        <div>
                            <strong>Существо #${aIdx + 1}</strong>
                            <div style="font-size:12px; margin-top:4px; color:var(--gold);">🍖 Потребность: ${animal.currentFood}/${reqFood}</div>
                        </div>
                        <div style="margin-top:10px;">${traitsHTML}</div>
                    `;

                    // Клики по животным (для навешивания свойств или атаки хищником)
                    card.onclick = () => handleAnimalClick(p.id, aIdx);
                    animsContainer.appendChild(card);
                });

                if (p.animals.length === 0) {
                    animsContainer.innerHTML = `<div style="color:#555; padding:20px; font-style:italic;">Нет выживших популяций</div>`;
                }

                eco.appendChild(animsContainer);
                container.appendChild(eco);
            });

            // Рука игрока (Вы)
            const handContainer = document.getElementById('my-hand');
            handContainer.innerHTML = '';
            players[0].hand.forEach((card, idx) => {
                const cDiv = document.createElement('div');
                cDiv.className = 'trait-card';
                if (selectedHandCardIndex === idx) cDiv.style.borderColor = 'var(--gold)';
                
                cDiv.innerHTML = `
                    <div><strong>${card.name}</strong></div>
                    <div style="font-size:11px; color:#aaa; margin:5px 0;">${card.desc}</div>
                    <div style="display:flex; gap:4px;">
                        <button onclick="playAsAnimal(${idx}); event.stopPropagation();" style="font-size:11px; padding:4px;">Сделать Существом</button>
                    </div>
                `;
                cDiv.onclick = () => {
                    selectedHandCardIndex = (selectedHandCardIndex === idx) ? null : idx;
                    updateUI();
                };
                handContainer.appendChild(cDiv);
            });

            // Обновление кормовой базы
            document.getElementById('food-count').innerText = foodBank;
            const ftc = document.getElementById('food-tokens-container');
            ftc.innerHTML = '';
            for (let i = 0; i < foodBank; i++) {
                const token = document.createElement('div');
                token.className = 'food-token';
                ftc.appendChild(token);
            }

            // Таблица очков
            document.getElementById('scores-list').innerHTML = players.map(p => `<div>${p.name}: <b>${p.score} очков в запасе</b></div>`).join('');
        }

        function calculateRequiredFood(animal) {
            let base = 1;
            animal.traits.forEach(t => {
                if (t.id === 'predator' || t.id === 'big') base += 1;
            });
            return base;
        }

        // ДЕЙСТВИЕ: Карту в качестве нового животного
        function playAsAnimal(cardIdx) {
            let human = players[0];
            human.hand.splice(cardIdx, 1);
            human.animals.push({ traits: [], currentFood: 0 });
            selectedHandCardIndex = null;
            logMessage("🐣 Вы вырастили новое существо на своем игровом столе.");
            nextTurn();
        }

        // КЛИК ПО ЖИВОТНОМУ (Добавление свойства ИЛИ Охота)
        function handleAnimalClick(playerId, animalIdx) {
            // Сценарий 1: Добавление свойства из руки в фазу развития
            if (phase === "development" && selectedHandCardIndex !== null && playerId === 0) {
                let human = players[0];
                let trait = human.hand[selectedHandCardIndex];
                let targetAnimal = human.animals[animalIdx];

                if (targetAnimal.traits.some(t => t.id === trait.id)) {
                    alert("У этого существа уже есть такое свойство!");
                    return;
                }

                targetAnimal.traits.push(trait);
                human.hand.splice(selectedHandCardIndex, 1);
                selectedHandCardIndex = null;
                logMessage(`🧬 Вы добавили свойство <b>${trait.name}</b> вашему Существу #${animalIdx + 1}.`);
                nextTurn();
                return;
            }

            // Сценарий 2: Выбор Хищника для атаки в фазу питания
            if (phase === "feeding" && playerId === 0) {
                let animal = players[0].animals[animalIdx];
                if (animal.traits.some(t => t.id === 'predator')) {
                    if (animal.currentFood >= calculateRequiredFood(animal)) {
                        alert("Этот хищник уже сыт!");
                        return;
                    }
                    selectedPredatorAnimal = { player: 0, index: animalIdx };
                    logMessage("⚔️ Вы выбрали своего хищника. Теперь нажмите на цель (любое существо другого игрока или свое).");
                    updateUI();
                    return;
                }
            }

            // Сценарий 3: Атака выбранным хищником на цель
            if (phase === "feeding" && selectedPredatorAnimal !== null) {
                executeAttack(selectedPredatorAnimal, { player: playerId, index: animalIdx });
            }
        }

        // ЛОГИКА АТАК ХИЩНИКА
        function executeAttack(attackerObj, defenderObj) {
            let attacker = players[attackerObj.player].animals[attackerObj.index];
            let defender = players[defenderObj.player].animals[defenderObj.index];

            if (attackerObj.player === defenderObj.player && attackerObj.index === defenderObj.index) {
                alert("Хищник не может атаковать самого себя!");
                return;
            }

            // Проверка защитных свойств классической эволюции
            if (defender.traits.some(t => t.id === 'swimming') && !attacker.traits.some(t => t.id === 'swimming')) {
                alert("Атака невозможна: цель Водоплавающее, а хищник — нет.");
                return;
            }
            if (defender.traits.some(t => t.id === 'big') && !attacker.traits.some(t => t.id === 'big')) {
                alert("Атака невозможна: цель Слишком Большая для этого хищника.");
                return;
            }
            if (defender.traits.some(t => t.id === 'camouflage') && Math.random() < 0.7) { // Камуфляж дает высокий шанс уклонения в этой реализации
                logMessage(`💨 Атака сорвалась! Существо защитилось с помощью свойства <b>Камуфляж</b>.`);
                selectedPredatorAnimal = null;
                nextTurn();
                return;
            }

            // Успешный укус / уничтожение
            logMessage(`🔴 <b>Хищник игрока ${players[attackerObj.player].name}</b> атаковал и СЪЕЛ существо #${defenderObj.index + 1} игрока ${players[defenderObj.player].name}!`);
            
            // Удаляем жертву
            players[defenderObj.player].animals.splice(defenderObj.index, 1);
            
            // Хищник получает сразу 2 ед. еды согласно классическим правилам
            attacker.currentFood = Math.min(calculateRequiredFood(attacker), attacker.currentFood + 2);
            
            selectedPredatorAnimal = null;
            nextTurn();
        }

        function playerPass() {
            players[0].passed = true;
            logMessage("⏸️ Вы сказали Пасс.");
            nextTurn();
        }

        // ДВИЖОК ОЧЕРЕДНОСТИ ХОДОВ И ИИ
        function nextTurn() {
            activePlayerIndex = (activePlayerIndex + 1) % players.length;

            // Проверка: завершилась ли фаза
            if (players.every(p => p.passed)) {
                endPhase();
                return;
            }

            let activePlayer = players[activePlayerIndex];
            if (activePlayer.passed) {
                nextTurn();
                return;
            }

            if (activePlayer.isAI) {
                setTimeout(() => runAILogic(activePlayer), 600);
            } else {
                updateUI();
            }
        }

        function runAILogic(ai) {
            if (phase === "development") {
                // Логика развития ИИ: выкладывает животных, если карт много, или вешает свойства
                if (ai.hand.length > 0) {
                    if (ai.animals.length === 0 || (ai.hand.length > 2 && Math.random() > 0.4)) {
                        ai.hand.pop();
                        ai.animals.push({ traits: [], currentFood: 0 });
                        logMessage(`🤖 ${ai.name} создал новое существо.`);
                    } else {
                        let trait = ai.hand.pop();
                        let randAnimal = ai.animals[Math.floor(Math.random() * ai.animals.length)];
                        if (!randAnimal.traits.some(t => t.id === trait.id)) {
                            randAnimal.traits.push(trait);
                            logMessage(`🤖 ${ai.name} развил свойство <b>${trait.name}</b> у одного из своих существ.`);
                        } else {
                            ai.hand.push(trait); // вернули, если дубль
                            ai.passed = true;
                            logMessage(`🤖 ${ai.name} пасует.`);
                        }
                    }
                } else {
                    ai.passed = true;
                    logMessage(`🤖 ${ai.name} пасует.`);
                }
            } else if (phase === "feeding") {
                // Логика питания ИИ
                let hungryAnimal = ai.animals.find(a => a.currentFood < calculateRequiredFood(a));
                
                if (hungryAnimal) {
                    if (foodBank > 0) {
                        // Берет из общей кормовой базы
                        foodBank--;
                        hungryAnimal.currentFood++;
                        logMessage(`🍇 ${ai.name} берет еду из природы для своего существа.`);
                    } else if (hungryAnimal.traits.some(t => t.id === 'predator')) {
                        // Пытается напасть, если еды нет
                        let targets = [];
                        players.forEach(p => {
                            p.animals.forEach((target, tIdx) => {
                                if (p.id !== ai.id) targets.push({ pId: p.id, animal: target, idx: tIdx });
                            });
                        });

                        if (targets.length > 0) {
                            let target = targets[Math.floor(Math.random() * targets.length)];
                            // Простейший симулированный укус
                            logMessage(`🔴 <b>${ai.name} (Хищник)</b> нападает на существо игрока ${players[target.pId].name}!`);
                            players[target.pId].animals.splice(target.idx, 1);
                            hungryAnimal.currentFood = Math.min(calculateRequiredFood(hungryAnimal), hungryAnimal.currentFood + 2);
                        } else {
                            ai.passed = true;
                        }
                    } else {
                        ai.passed = true;
                    }
                } else {
                    ai.passed = true;
                }
            }

            nextTurn();
        }

        // СМЕНА ФАЗ ИГРЫ
        function endPhase() {
            if (phase === "development") {
                // Переход к питанию, кидаем кубик на кормовую базу
                phase = "feeding";
                document.getElementById('current-phase').innerText = "Питание (Борьба за ресурсы)";
                document.getElementById('current-phase').style.color = "var(--gold)";
                document.getElementById('food-zone').style.display = 'block';

                // По классическим правилам: Количество еды зависит от броска кубика и числа игроков
                let dice = Math.floor(Math.random() * 6) + 1;
                foodBank = dice + players.length; 
                logMessage(`🎲 Бросок кубиков! Кормовая база в этом раунде составила: <b>${foodBank} ед. ресурсов</b>.`);
                
                // Перерасчет пасов
                players.forEach(p => {
                    // Игрок автоматически пасует, если все его животные уже сыты
                    let needsFood = p.animals.some(a => a.currentFood < calculateRequiredFood(a));
                    p.passed = !needsFood;
                });
                
                // Добавляем клик по зоне еды для Человека
                document.getElementById('food-zone').onclick = () => {
                    if (phase === "feeding" && activePlayerIndex === 0 && !players[0].passed) {
                        let hungry = players[0].animals.find(a => a.currentFood < calculateRequiredFood(a));
                        if (hungry && foodBank > 0) {
                            foodBank--;
                            hungry.currentFood++;
                            logMessage("🍇 Вы покормили своё существо растительной пищей из кормовой базы.");
                            
                            // Проверка сытости после кормежки
                            if (!players[0].animals.some(a => a.currentFood < calculateRequiredFood(a))) {
                                players[0].passed = true;
                            }
                            nextTurn();
                        }
                    }
                };

                nextTurn();
            } else if (phase === "feeding") {
                // Переход к вымиранию
                phase = "extinction";
                logMessage("🍂 Наступили холода... Фаза вымирания нежизнеспособных видов.");
                
                players.forEach(p => {
                    // Выживают только сытые
                    let survivors = p.animals.filter(a => a.currentFood >= calculateRequiredFood(a));
                    let deadCount = p.animals.length - survivors.length;
                    if (deadCount > 0) {
                        logMessage(`💀 У игрока <b>${p.name}</b> погибло от голода существ: ${deadCount}`);
                    }
                    
                    // Начисление победных очков за выживших существ в банк раунда
                    p.score += survivors.length;
                    
                    // Обнуляем еду для следующего раунда
                    survivors.forEach(a => a.currentFood = 0);
                    p.animals = survivors;
                });

                // Раздача новых карт из колоды (по схеме: выжившие существа + 1 карта)
                players.forEach(p => {
                    let cardsToDraw = p.animals.length + 1;
                    for (let i = 0; i < cardsToDraw; i++) {
                        p.hand.push(getRandomTrait());
                    }
                });

                round++;
                if (round > 5) {
                    endGame();
                } else {
                    initRound();
                }
            }
        }

        function endGame() {
            alert("Игра завершена! Смотрите финальный подсчет очков в панели.");
            let winner = [...players].sort((a,b) => b.score - a.score)[0];
            logMessage(`🏆 <b>Эволюционный отбор завершен! Победитель: ${winner.name} с результатом в ${winner.score} очков.</b>`);
            document.getElementById('controls').innerHTML = `<button onclick="location.reload()">Начать заново</button>`;
        }

        function logMessage(msg) {
            const log = document.getElementById('log');
            log.innerHTML += `<div>${msg}</div>`;
            log.scrollTop = log.scrollHeight;
        }
    </script>
</body>
</html>
